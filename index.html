<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INME Lab – Interaktive Medien · THWS Business School</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    <!-- DESIGN DECISION: Bilingual color scheme
         DE mode: Bauhaus Red #DC2626 (primary brand color)
         EN mode: Lamy Safari Mango #F7CC00 (alternative accent)
         The language toggle intentionally switches the entire color palette
         to create distinct visual identities for each language version.
         This is a conscious design choice, not a bug. -->

    <!-- DESIGN DECISION: DE=Bauhaus Red #DC2626, EN=Lamy Safari Mango #F7CC00.
         The language toggle intentionally switches the color scheme (bilingual Bauhaus concept). -->
    :root {
      --primary: #B91C1C;
      --accent: #DC2626;
      --dark: #1A1A1A;
      --light-bg: #FAFAFA;
      --primary-light: rgba(185,28,28,0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #FFFFFF;
      color: var(--dark);
    }

    h2 {
      color: #B91C1C;
      font-weight: 800;
      font-family: 'Space Grotesk', sans-serif;
    }

    h3 {
      color: #B91C1C;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
    }

    .bauhaus-card {
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .bauhaus-accent-line {
      width: 48px;
      height: 4px;
      background: #DC2626;
    }

    .bauhaus-badge {
      background: #DC2626;
      color: white;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 0;
      display: inline-block;
    }

    .bauhaus-badge-red {
      background: #B91C1C;
      color: white;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 0;
      display: inline-block;
    }

    /* Geometric background animations */
    @keyframes floatCircle {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    @keyframes floatSquare {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(20px) rotate(8deg); }
    }

    .geo-circle {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: #B91C1C;
      opacity: 0.15;
      top: -80px;
      right: -100px;
      animation: floatCircle 8s ease-in-out infinite;
      pointer-events: none;
    }

    .geo-square {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 0;
      background: #DC2626;
      opacity: 0.2;
      bottom: -60px;
      left: -60px;
      animation: floatSquare 10s ease-in-out infinite;
      pointer-events: none;
    }

    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      height: 56px;
      background: white;
      border-bottom: 1px solid #E5E7EB; box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }

    /* Lang toggle */
    .lang-btn {
      padding: 0.25rem 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      background: transparent;
      color: #1A1A1A;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn.active {
      background: #B91C1C;
      color: white;
      border-color: #B91C1C;
    }

    /* Hero */
    .hero {
      background: #DC2626;
      position: relative;
      min-height: calc(var(--vh, 100vh) - 156px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 3.5rem;
      box-sizing: border-box;
    }
    /* 186px = quote(30) + navbar(56) + stats(80) + puffer(20) */

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 4rem 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero-tag {
      border: 1.5px solid rgba(255,255,255,0.5);
      color: rgba(255,255,255,0.85);
      padding: 0.25rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 0;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    
    .hero-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 1rem;
    }

    .hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 8rem;
      color: white;
      line-height: 0.95;
      margin-bottom: 0.5rem;
    }

    .hero-subtitle {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .hero-desc {
      color: rgba(255,255,255,0.88);
      font-size: 1.25rem;
      margin-bottom: 2.5rem;
    }

    
    .hero-course { display: none; }  /* entfernt – Info steht im Badge-Block */
    .course-badges { margin-top: 1.25rem; margin-bottom: 2rem; }

    .course-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .course-badge {
      border: 1.5px solid rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.75);
      padding: 0.2rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 600;
      border-radius: 0;
      display: inline-block;
    }

    .cta-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: #B91C1C;
      color: white;
      padding: 0.75rem 1.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 0;
      border: 2px solid #B91C1C;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s;
    }

    .btn-primary:hover {
      background: #991B1B;
      border-color: #991B1B;
    }

    .btn-outline-white {
      background: transparent;
      color: white;
      padding: 0.75rem 1.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 0;
      border: 2px solid rgba(255,255,255,0.6);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-outline-white:hover {
      border-color: white;
      color: white;
    }
    [data-lang="en"] .btn-outline-white:hover {
      border-color: #1A1A1A;
      color: #1A1A1A;
    }

    /* Stats bar */
    .stats-bar {
      background: white;
      box-shadow: 0 -1px 0 rgba(185,28,28,0.08), 0 4px 20px rgba(0,0,0,0.05);
    }
    .stats-bar .stat-item {
      text-align: center;
      padding: 1.75rem 1.5rem;
      position: relative;
    }
    .stats-bar .stat-item + .stat-item::before {
      content: '';
      position: absolute; left: 0; top: 25%; height: 50%;
      width: 1px; background: rgba(185,28,28,0.12);
    }
    .stats-bar .stat-value {
      font-size: 2.75rem; font-weight: 900;
      color: #DC2626; line-height: 1;
    }
    .stats-bar .stat-label {
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: #B91C1C; margin-top: 0.4rem;
    }
    [data-lang="en"] .stats-bar .stat-value { color: #1A1A1A; }
    [data-lang="en"] .stats-bar .stat-label { color: #6B7280; }

    .stats-grid {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: space-around;
      align-items: center;
    }

    .stat-item {
      text-align: center;
      min-width: 120px;
    }

    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 2.75rem;
      color: #B91C1C;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .stat-label {
      font-size: 0.9rem;
      color: #6B7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.35rem;
    }

    /* Labs section */
    .labs-section {
      background: #FFFFFF;
      padding: 5rem 2rem;
    }

    .section-header {
      max-width: 1200px;
      margin: 0 auto 2.5rem;
    }

    .labs-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }

    @media (max-width: 900px) {
      .labs-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      
    .hero-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 1rem;
    }

    .hero-title { font-size: 3rem; }
      .hero-subtitle { font-size: 1.4rem; }
      .labs-grid {
        grid-template-columns: 1fr;
      }
      .usecase-cols {
        flex-direction: column !important;
      }
      .usecase-img {
        width: 100% !important;
      }
    }

    .lab-card {
      border: 2px solid #1A1A1A;
      border-left: 4px solid #B91C1C;
      border-radius: 0;
      background: white;
      padding: 1.75rem 1.75rem;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-height: 220px;
      overflow: hidden;
    }

    .lab-num-badge {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900;
      font-size: 2.5rem;
      color: #DC2626;
      line-height: 1;
      margin-bottom: 0.75rem;
      letter-spacing: -0.03em;
      position: static;
      padding: 0;
      background: none;
    }
    [data-lang="en"] .lab-num-badge { color: #1A1A1A; }

    .lab-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: #B91C1C;
      margin-bottom: 0.1rem;
    }

    .lab-subtitle {
      font-size: 0.8rem;
      color: #6B7280;
      font-weight: 500;
    }

    .lab-desc {
      font-size: 0.875rem;
      color: #374151;
      line-height: 1.5;
      flex: 1;
    }

    .btn-lab-link {
      display: block;
      width: calc(100% + 3.5rem);
      margin: auto -1.75rem -1.75rem;
      padding: 1rem 1.75rem;
      background: none;
      border-top: 1px solid #E5E7EB;
      color: #B91C1C;
      font-weight: 800;
      font-size: 1rem;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .btn-lab-link::after {
      content: '→';
      font-size: 1.1rem;
      transition: transform 0.18s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-lab-link:hover {
      background: #B91C1C;
      color: white;
      border-top-color: #B91C1C;
    }
    [data-lang="en"] .btn-lab-link { color: #1A1A1A; }
    [data-lang="en"] .btn-lab-link:hover { background: #F7CC00; color: #1A1A1A; border-top-color: #F7CC00; }

    /* Use Case section */
    .usecase-section {
      background: #DC2626;
      padding: 4rem 2rem 3rem;
    }

    .usecase-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .usecase-cols {
      display: flex;
      gap: 4rem;
      align-items: center;
    }

    .usecase-img {
      width: 45%;
      flex-shrink: 0;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 0;
      max-height: 380px;
    }

    .usecase-img-placeholder {
      width: 45%;
      flex-shrink: 0;
      height: 320px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
    }

    .usecase-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.75rem;
      color: white;
      margin: 1rem 0 0.75rem;
      line-height: 1.2;
    }

    .usecase-desc {
      color: #D1D5DB;
      font-size: 1rem;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    /* Footer */
    .footer {
      background: #DC2626;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .footer-sep {
      width: 48px;
      height: 3px;
      background: #DC2626;
      margin: 0 auto 1.25rem;
    }

    .footer-text {
      color: rgba(255,255,255,0.55);
      font-size: 0.875rem;
      font-weight: 500;
    }

    /* Stat dividers */
    .stat-divider {
      width: 1px;
      height: 40px;
      background: #E5E7EB;
    }

    @media (max-width: 600px) {
      .stat-divider { display: none; }
    }
  
    /* v2.0 Modern Upgrades */
    a { color: var(--primary); }
    button { transition: all 0.2s ease; }
    button:hover { opacity: 0.85; transform: translateY(-1px); }
    .sidebar-item { border-radius: 6px; margin: 2px 8px; }
    .code-block { border-radius: 8px; }
    .tip-box, .challenge-box, .info-box, .concept-box { border-radius: 8px; }
    img { border-radius: 8px; }

    
    /* ═══════════════════════════════════════════
       EN MANGO MODE – vollständige Farbumschaltung
       DE = Rot (#DC2626) | EN = Mango (#F7CC00) mit Dunkel
       ═══════════════════════════════════════════ */

    /* Texte + Links */
    [data-lang="en"] h2,
    [data-lang="en"] h3 { color: #1A1A1A; }
    [data-lang="en"] a { color: #1A1A1A; }

    /* Stats-Banderole */
    [data-lang="en"] .stats-bar .stat-value { color: #1A1A1A; }
    [data-lang="en"] .stats-bar .stat-label { color: #6B7280; }
    [data-lang="en"] .stat-value { color: #1A1A1A; }
    [data-lang="en"] .stats-bar .stat-item + .stat-item::before { background: rgba(0,0,0,0.12); }

    /* Bauhaus-Elemente */
    [data-lang="en"] .bauhaus-accent-line { background: #F7CC00; }
    [data-lang="en"] .bauhaus-badge { background: #1A1A1A; color: #F7CC00; }
    [data-lang="en"] .bauhaus-badge-red { background: #1A1A1A; }

    /* Lab-Kacheln */
    [data-lang="en"] .lab-card { border-left-color: #F7CC00; }
    [data-lang="en"] .lab-num-badge { color: #1A1A1A; }
    [data-lang="en"] .lab-title,
    [data-lang="en"] .lab-link,
    [data-lang="en"] .lab-number { color: #1A1A1A; }
    [data-lang="en"] .lab-number { background: #1A1A1A; color: #F7CC00; }
    /* EN btn-lab-link: geregelt weiter oben – kein Duplikat */

    /* CTA-Buttons */
    [data-lang="en"] .btn-primary { background: #1A1A1A !important; border-color: #1A1A1A !important; color: #F7CC00 !important; }
    [data-lang="en"] .btn-primary:hover { background: #333 !important; border-color: #333 !important; }
    [data-lang="en"] .btn-outline-white { color: #1A1A1A; border-color: rgba(0,0,0,0.35); }
    [data-lang="en"] .btn-outline-white:hover { background: rgba(0,0,0,0.06); color: #1A1A1A; }

    /* Language-Toggle */
    [data-lang="en"] .lang-btn.active { background: #1A1A1A; color: #F7CC00; border-color: #1A1A1A; }

    /* Use-Case-Sektion */
    [data-lang="en"] .usecase-section { background: #1A1A1A; }
    [data-lang="en"] .use-case-badge { background: #F7CC00; color: #1A1A1A; }
    [data-lang="en"] .use-case-accent { background: #F7CC00; }
    [data-lang="en"] .section-accent { background: #1A1A1A; }

    /* Footer */
    [data-lang="en"] .footer { background: #1A1A1A; }
    [data-lang="en"] .footer-sep { background: #F7CC00; }

    /* Quote Section */
    [data-lang="en"] .quote-name { color: #1A1A1A; }


    /* ── Jony Ive Quote Section ── */
    .quote-section {
      background: #FAFAFA;
      padding: 5rem 2rem;
      border-top: 1px solid #E5E7EB;
      border-bottom: 1px solid #E5E7EB;
      overflow: hidden;
    }
    .quote-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 4rem;
    }
    .quote-portrait {
      flex-shrink: 0;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #E5E7EB;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    }
    .quote-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }
    .quote-text-block {
      flex: 1;
    }
    .quote-body {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.35rem;
      line-height: 1.8;
      color: #1A1A1A;
      font-style: normal;
      font-weight: 400;
      margin-bottom: 1.75rem;
    }
    .quote-attribution {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .quote-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: #DC2626;
      letter-spacing: 0.02em;
    }
    [data-lang="en"] .quote-name { color: #1A1A1A; }
    .quote-role {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      color: #9CA3AF;
      font-weight: 500;
    }
    /* ── Quote Source Note ── */
    .quote-source {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 0.5rem;
      font-weight: 400;
    }
    .quote-source-de { display: inline; }
    .quote-source-en { display: none; }
    [data-lang="en"] .quote-source-de { display: none; }
    [data-lang="en"] .quote-source-en { display: inline; }

    /* ── Quote Scroll-Reveal via IntersectionObserver ── */
    /* Portrait: von links, Text: von rechts, beide fade */
    .quote-portrait-wrap {
      opacity: 0;
      transform: translateX(-48px);
      transition: opacity 0.85s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.85s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .quote-text-block {
      opacity: 0;
      transform: translateX(48px);
      transition: opacity 0.85s cubic-bezier(0.16, 1, 0.3, 1) 0.2s,
                  transform 0.85s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
    }
    .quote-portrait-wrap.q-visible,
    .quote-text-block.q-visible {
      opacity: 1;
      transform: translateX(0);
    }
    @media (max-width: 640px) {
      .quote-inner { flex-direction: column; gap: 2rem; text-align: center; }
      .quote-mark { left: 0; }
      .quote-attribution { align-items: center; }
    }
  
    /* ── Phone Frame – iPhone 7 Silver Style ── */
    .phone-frame-wrap {
      flex-shrink: 0;
      position: relative;
      width: 260px;
    }
    .phone-shell {
      position: relative;
      width: 260px;
      background: linear-gradient(160deg, #D8D8DC 0%, #B8B8BC 40%, #C4C4C8 70%, #A8A8AC 100%);
      border-radius: 40px;
      padding: 0;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.6),
