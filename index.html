    .bauhaus-accent-line {

      height: 4px;
      background: #DC2626;

      color: white;

      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 0;
      display: inline-block;
    }

    .bauhaus-badge-red {
      background: #B91C1C;
      color: white;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 0;
      display: inline-block;
    }

    /* Geometric background animations */
    @keyframes floatCircle {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    @keyframes floatSquare {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(20px) rotate(8deg); }
    }

    .geo-circle {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: #B91C1C;
      opacity: 0.15;
      top: -80px;
      right: -100px;
      animation: floatCircle 8s ease-in-out infinite;
      pointer-events: none;
    }

    .geo-square {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 0;
      background: #DC2626;
      opacity: 0.2;
      bottom: -60px;
      left: -60px;
      animation: floatSquare 10s ease-in-out infinite;
      pointer-events: none;
    }

    /* Navbar */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: white;
      border-bottom: 1px solid #E5E7EB; box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }

      padding: 0.25rem 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      background: transparent;
      color: #1A1A1A;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn.active {
      background: #B91C1C;
      color: white;
      border-color: #B91C1C;
    }

      background: #DC2626;
      position: relative;
      min-height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 120px;
      padding-bottom: 80px;

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 4rem 2rem;
      max-width: 800px;
      margin: 0 auto;

    .hero-tag {

      color: rgba(255,255,255,0.85);
      padding: 0.25rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 0;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    
    .hero-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
      margin-bottom: 1rem;
    }

    .hero-title {

      font-weight: 800;
      font-size: 6.5rem;
      color: white;
      line-height: 0.95;
      margin-bottom: 0.5rem;
    }

    .hero-subtitle {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 2rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .hero-desc {
      color: rgba(255,255,255,0.88);
      font-size: 1.25rem;
      margin-bottom: 2.5rem;
    }

      font-weight: 600;
      white-space: nowrap;
      margin-top: 0.25rem;
      margin-bottom: 2rem;

      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .course-badge {

      color: rgba(255,255,255,0.75);
      padding: 0.2rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 600;
      border-radius: 0;
      display: inline-block;
    }

    .cta-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

      color: white;

      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;

      border: 2px solid #B91C1C;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background 0.15s;
    }

    .btn-primary:hover {
      background: #991B1B;
      border-color: #991B1B;
    }

    .btn-outline-white {

      font-weight: 700;

      text-decoration: none;
      display: inline-block;
      transition: border-color 0.15s, color 0.15s;

      color: white;

      border-color: #1A1A1A;
      color: #1A1A1A;
    }

      background: #1A1A1A;
      padding: 1.75rem 3rem;

    .stats-bar .stat-divider { background: rgba(255,255,255,0.12); }

      gap: 1.5rem;
      justify-content: space-around;
      align-items: center;

      min-width: 120px;

    .stat-value {

      font-weight: 800;
      font-size: 3.5rem;
      color: #B91C1C;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;

      color: #6B7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.35rem;

      padding: 5rem 2rem;

      margin: 0 auto 3rem;

      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;

        grid-template-columns: repeat(2, 1fr);

      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
      border-radius: 0;
      font-family: 'Space Grotesk', sans-serif;

      font-weight: 700;
      font-size: 1rem;
      color: #B91C1C;
      margin-bottom: 0.1rem;

      font-weight: 500;

      align-self: flex-start;

      padding: 5rem 2rem;

      margin: 0 auto;

      align-items: center;

      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 0;

    }

    .usecase-img-placeholder {

      flex-shrink: 0;
      height: 320px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
    }

    .usecase-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.75rem;
      color: white;
      margin: 1rem 0 0.75rem;
      line-height: 1.2;
    }

    .usecase-desc {
      color: #D1D5DB;
      font-size: 1rem;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    .footer {
      background: #DC2626;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 2.5rem 2rem;
      text-align: center;

      font-weight: 500;

      width: 1px;
      height: 40px;
      background: #E5E7EB;
    }

    @media (max-width: 600px) {
      .stat-divider { display: none; }
    }

    [data-lang="en"] .use-case-badge { background: #1A1A1A; }
    [data-lang="en"] .use-case-accent { background: #1A1A1A; }

            <div style={{ display: 'flex', gap: '0.35rem' }}>
              <button
                className={`lang-btn${lang === 'de' ? ' active' : ''}`}
                onClick={() => setLang('de')}
                aria-label="Deutsch"
              >
                DE
              </button>
              <button
                className={`lang-btn${lang === 'en' ? ' active' : ''}`}
                onClick={() => setLang('en')}
                aria-label="English"
              >
                EN
              </button>
            </div>
          </nav>

          {/* Hero */}
          <section className="hero" style={{background: heroColor}}>
            <div className="hero-content">
              <span className="hero-tag" style={{borderColor: heroBadgeBorder, color: heroTextMuted}}>{t.heroTag}</span>
              <div className="hero-eyebrow" style={{color: heroTextMuted}}>{t.heroEyebrow}</div>
              <h1 className="hero-title" style={{color: heroTextColor}}>{t.heroTitle}</h1>
              <div className="hero-subtitle" style={{color: heroTextMuted}}>{t.heroSubtitle}</div>
              <p className="hero-desc" style={{color: heroTextMuted}}>{t.heroDesc}</p>
              <p className="hero-course" style={{color: heroTextMuted}}>{t.heroCourse}</p>
              <div className="course-badges">
                <span className="course-badge" style={{borderColor: heroBadgeBorder, color: heroTextMuted}}>{t.badge1}</span>
                <span className="course-badge" style={{borderColor: heroBadgeBorder, color: heroTextMuted}}>{t.badge2}</span>
                <span className="course-badge" style={{borderColor: heroBadgeBorder, color: heroTextMuted}}>{t.badge3}</span>
              </div>
              <div className="cta-row">
                <a href="#labs" className="btn-primary" style={{background: heroTextColor, color: heroColor}}>{t.ctaLabs}</a>
                <a
                  href="https://github.com/swrobuts/inme"
                  target="_blank"
                  rel="noopener noreferrer"
                  className="btn-outline-white"
                  style={{color: heroTextColor, borderColor: heroBadgeBorder}}
                >
                  {t.ctaGithub}
                </a>
              </div>
            </div>
          </section>

          {/* Stats Banderole */}
          <div className="stats-bar">
            <div className="stats-grid">
              <div className="stat-item">
                <div className="stat-value">6</div>
                <div className="stat-label">{t.statLabs}</div>
              </div>
              <div className="stat-divider"></div>
              <div className="stat-item">
                <div className="stat-value">1</div>
                <div className="stat-label">{t.statUseCase}</div>
              </div>
              <div className="stat-divider"></div>
              <div className="stat-item">
                <div className="stat-value" style={{ fontSize: '1.4rem' }}>{t.statTech}</div>
                <div className="stat-label">{t.statTech}</div>
              </div>
              <div className="stat-divider"></div>
              <div className="stat-item">
                <div className="stat-value">{t.statLang}</div>
                <div className="stat-label">{t.statLangLabel}</div>
              </div>
            </div>
          </div>

          {/* Labs Grid */}
          <section className="labs-section" id="labs">
            <div className="section-header">
              <h2 style={{ fontSize: '2.25rem', marginBottom: '0.75rem' }}>{t.sectionLabs}</h2>
              <div className="bauhaus-accent-line"></div>
            </div>
            <div className="labs-grid">
              {t.labs.map((lab) => (
                <div key={lab.num} className="lab-card">
                  <span className="lab-num-badge">{lab.num}</span>
                  <div>
                    <div className="lab-title">{lab.title}</div>
                    <div className="lab-subtitle">{lab.subtitle}</div>
                  </div>
                  <p className="lab-desc">{lab.desc}</p>
                  <a href={lab.link} className="btn-lab-link">{t.labLink}</a>
                </div>
              ))}
            </div>
          </section>

          {/* Use Case Teaser */}
          <section className="usecase-section">
            <div className="usecase-inner">
              <div className="usecase-cols">
                <div style={{
                  width: '220px',
                  flexShrink: 0,
                  background: '#0A0A0A',
                  borderRadius: '32px',
                  padding: '12px',
                  boxShadow: '0 0 0 2px #222, 0 24px 64px rgba(0,0,0,0.5)',
                  position: 'relative'
                }}>
                  {/* Notch */}
                  <div style={{
                    width: '80px', height: '20px',
                    background: '#0A0A0A',
                    borderRadius: '0 0 12px 12px',
                    margin: '0 auto 6px',
                    position: 'relative', zIndex: 2
                  }}></div>
                  {/* Screen */}
                  <div style={{
                    borderRadius: '20px',
                    overflow: 'hidden',
                    background: '#F5F5F7',
                    aspectRatio: '9/16'
                  }}>
                    <img
                      src="images/coffee-app-screen.jpg"
                      alt="Kaffeemaschinen Service App"
                      style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'top' }}
                    />
                  </div>
                  {/* Home bar */}
                  <div style={{
                    width: '60px', height: '4px',
                    background: '#444',
                    borderRadius: '2px',
                    margin: '8px auto 0'
                  }}></div>
                </div>
                <div style={{ flex: 1 }}>
                  <span className="bauhaus-badge-red">{t.useCaseBadge}</span>
                  <h2 className="usecase-title" style={{ color: 'white' }}>{t.useCaseTitle}</h2>
                  <div className="bauhaus-accent-line" style={{ marginBottom: '1.5rem' }}></div>
                  <p className="usecase-desc">{t.useCaseDesc}</p>
                  <a href="coffee-app.html" className="btn-primary">{t.useCaseBtn}</a>
                </div>
              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="footer">
            <div className="footer-sep"></div>
            <p className="footer-text">{t.footerText}</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
