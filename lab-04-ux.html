<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 04 – UX Research & Prototyping | INME Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --primary: #B91C1C;
      --accent: #DC2626;
      --dark: #1A1A1A;
      --light-bg: #FAFAFA;
      --primary-light: rgba(185,28,28,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #FAFAFA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; color: #1A1A1A; }
    h2 { color: #B91C1C; font-weight: 800; font-family: 'Space Grotesk', sans-serif; margin-top: 0; }
    h3 { color: #B91C1C; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    h4 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; margin: 0.5rem 0; }
    .lernziele-box { background: #FEF2F2; border-left: 4px solid #DC2626; border-radius: 0; padding: 1.5rem; margin-top: 1.25rem; }
    [data-lang="en"] .lernziele-box { border-left-color: #1A1A1A !important; }
    .lernziele-heading { color: #DC2626; }
    [data-lang="en"] .lernziele-heading { color: #1A1A1A !important; }
    p { line-height: 1.7; }

    /* Bauhaus */
    .bauhaus-card { border: 2px solid #1A1A1A; border-radius: 0; padding: 1.5rem; background: white; }
    .bauhaus-accent-line { width: 48px; height: 4px; background: #DC2626; margin: 0.5rem 0 1rem 0; }
    .bauhaus-badge { background: #DC2626; color: white; padding: 0.2rem 0.7rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 0; display: inline-block; }

    /* Code */
    .code-block { background: #F3F4F6; color: #1A1A1A; padding: 1.25rem; border-left: 4px solid #D1D5DB; font-family: monospace; font-size: 0.85rem; overflow-x: auto; position: relative; border-radius: 0; white-space: pre; margin: 1rem 0; }
    .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: #1A1A1A; color: white; border: none; padding: 0.25rem 0.6rem; font-size: 0.75rem; font-weight: 700; cursor: pointer; border-radius: 0; }
    .copy-btn:hover { background: #D97706; }

    /* Info boxes */
    .tip-box { border-left: 4px solid #DC2626; background: #fafafa; padding: 1rem 1.25rem; margin: 1rem 0; }
    .info-box { border-left: 4px solid #3b82f6; background: #eff6ff; padding: 1rem 1.25rem; margin: 1rem 0; }
    .concept-box { border-left: 4px solid #B91C1C; background: rgba(185,28,28,0.08); padding: 1rem 1.25rem; margin: 1rem 0; }
    .challenge-box { border-left: 4px solid #22c55e; background: #f0fdf4; padding: 1rem 1.25rem; margin: 1rem 0; }

    /* Quiz */
    .quiz-option { display: block; width: 100%; text-align: left; padding: 0.75rem 1rem; margin: 0.4rem 0; border: 2px solid #e5e7eb; border-radius: 0; background: white; cursor: pointer; font-size: 0.95rem; transition: border-color 0.15s, background 0.15s; }
    .quiz-option:hover:not(:disabled) { border-color: #B91C1C; background: rgba(185,28,28,0.04); }
    .quiz-option.correct { border-color: #22c55e; background: #f0fdf4; color: #166534; font-weight: 600; }
    .quiz-option.wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
    .quiz-option:disabled { cursor: default; }

    /* Layout */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 100;
      background: white; border-bottom: 1px solid #E5E7EB; box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
    }
    .header-left { display: flex; align-items: center; gap: 1.5rem; }
    .header-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.1rem; color: #B91C1C; text-decoration: none; }
    .header-back { font-size: 0.85rem; color: #555; text-decoration: none; font-weight: 500; }
    .header-back:hover { color: #B91C1C; }
    .lang-btn { border: 2px solid #1A1A1A; background: white; padding: 0.2rem 0.6rem; font-size: 0.78rem; font-weight: 700; cursor: pointer; border-radius: 0; letter-spacing: 0.05em; }
    .lang-btn.active { background: #DC2626; color: white; }
    .lang-btn:hover:not(.active) { background: #f5f5f5; }

    .sidebar {
      position: fixed; top: 56px; left: 0; width: 260px;
      height: calc(100vh - 56px); overflow-y: auto;
      border-right: 1px solid #E5E7EB; background: white;
      padding: 1.5rem 0;
    }
    .sidebar-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #888; padding: 0 1.25rem; margin-bottom: 0.75rem; }
    .sidebar-link {
      display: block; padding: 0.55rem 1.25rem; font-size: 0.88rem; color: #444;
      text-decoration: none; border-left: 3px solid transparent;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      font-weight: 500;
    }
    .sidebar-link:hover { color: #B91C1C; background: rgba(185,28,28,0.04); }
    .sidebar-link.active { color: #B91C1C; border-left-color: #B91C1C; background: rgba(185,28,28,0.06); font-weight: 700; }

    .main-content {
      margin-left: 260px; padding-top: 72px; padding-bottom: 4rem;
      padding-left: 3rem; padding-right: 3rem; max-width: 960px;
    }

    .section-block { margin-bottom: 4rem; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    th { background: #DC2626; color: white; padding: 0.65rem 1rem; text-align: left; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 0.82rem; letter-spacing: 0.05em; }
    td { padding: 0.6rem 1rem; border-bottom: 1px solid #e5e7eb; vertical-align: top; }
    tr:nth-child(even) td { background: #f9fafb; }
    tr:hover td { background: rgba(185,28,28,0.03); }

    /* Research Method Cards */
    .method-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin: 1.25rem 0; }
    .method-card { border: 2px solid #1A1A1A; padding: 1.25rem; background: white; }
    .method-card .m-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .method-card h4 { color: #B91C1C; margin: 0.2rem 0 0.4rem; font-size: 0.95rem; }
    .method-card p { font-size: 0.85rem; color: #555; margin: 0; line-height: 1.55; }

    /* Persona Card */
    .persona-card { border: 2px solid #1A1A1A; background: white; overflow: hidden; max-width: 520px; margin: 1.25rem 0; }
    .persona-header { background: #DC2626; color: white; padding: 1rem 1.25rem; }
    .persona-header .p-name { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.1rem; }
    .persona-header .p-role { font-size: 0.85rem; color: #aaa; margin-top: 0.15rem; }
    .persona-section { padding: 0.85rem 1.25rem; border-bottom: 1px solid #e5e7eb; }
    .persona-section:last-child { border-bottom: none; }
    .persona-section h4 { font-family: 'Space Grotesk', sans-serif; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin: 0 0 0.5rem; }
    .persona-section ul { margin: 0; padding-left: 1.1rem; font-size: 0.88rem; }
    .persona-section li { margin-bottom: 0.25rem; line-height: 1.5; }
    .persona-affinity { display: flex; gap: 0.25rem; align-items: center; }
    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .dot.filled { background: #B91C1C; }
    .dot.empty { background: #e5e7eb; border: 1px solid #ccc; }
    .persona-quote { font-style: italic; font-size: 0.9rem; color: #555; margin-top: 0.4rem; }

    /* User Story Cards */
    .user-story-card { border-left: 4px solid #B91C1C; border-top: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; border-radius: 0; background: white; padding: 1rem 1.25rem; margin: 0.6rem 0; font-size: 0.95rem; line-height: 1.6; }
    .user-story-card .story-num { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #B91C1C; margin-bottom: 0.3rem; }

    /* Sitemap */
    .sitemap { font-family: monospace; font-size: 0.9rem; background: white; border: 2px solid #1A1A1A; padding: 1.25rem 1.5rem; display: inline-block; line-height: 1.9; margin: 1rem 0; }
    .sitemap .root { font-weight: 700; font-size: 1rem; color: #B91C1C; }
    .sitemap .node { color: #1A1A1A; }
    .sitemap .connector { color: #888; }

    /* Journey table */
    .journey-table { font-size: 0.82rem; }
    .journey-table th { font-size: 0.75rem; }
    .emotion-curve { margin: 1.5rem 0 0.5rem; }

    /* Figma steps */
    .figma-steps { counter-reset: step-counter; list-style: none; padding: 0; margin: 1rem 0; }
    .figma-steps li { counter-increment: step-counter; display: flex; gap: 1rem; align-items: flex-start; padding: 0.75rem 0; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; line-height: 1.55; }
    .figma-steps li:last-child { border-bottom: none; }
    .figma-steps li::before { content: counter(step-counter); background: #B91C1C; color: white; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.8rem; min-width: 26px; height: 26px; border-radius: 0; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 0.05rem; }

    /* Resources */
    .resource-links { list-style: none; padding: 0; margin: 1rem 0; }
    .resource-links li { padding: 0.6rem 0; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }
    .resource-links li:last-child { border-bottom: none; }
    .resource-links a { color: #B91C1C; text-decoration: none; font-weight: 600; }
    .resource-links a:hover { text-decoration: underline; }
    .resource-links .res-desc { color: #666; font-size: 0.85rem; margin-left: 0.4rem; }

    /* Quiz */
    .quiz-question-block { margin-bottom: 2rem; padding: 1.5rem; border: 2px solid #e5e7eb; background: white; }
    .quiz-question-block h4 { margin: 0 0 1rem; font-size: 1rem; line-height: 1.5; }
    .quiz-explanation { margin-top: 0.75rem; padding: 0.75rem 1rem; background: #f0fdf4; border-left: 3px solid #22c55e; font-size: 0.88rem; color: #166534; }
    .quiz-explanation.wrong-exp { background: #fef2f2; border-left-color: #ef4444; color: #991b1b; }
    .score-display { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; margin: 1.5rem 0 1rem; color: #1A1A1A; }

    /* Nav bottom */
    .nav-bottom { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; margin-top: 2rem; }
    .nav-btn { border: 2px solid #1A1A1A; background: white; padding: 0.65rem 1.25rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; text-decoration: none; color: #1A1A1A; font-family: 'Space Grotesk', sans-serif; display: inline-block; border-radius: 0; }
    .nav-btn:hover { background: #DC2626; color: white; }
    .nav-btn.primary { background: #B91C1C; border-color: #B91C1C; color: white; }
    .nav-btn.primary:hover { background: #991b1b; border-color: #991b1b; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding-left: 1.25rem; padding-right: 1.25rem; }
      .method-cards { grid-template-columns: 1fr; }
    }
  
    /* v2.0 Modern Upgrades */
    a { color: var(--primary); }
    button { transition: all 0.2s ease; }
    button:hover { opacity: 0.85; transform: translateY(-1px); }
    .sidebar-item { border-radius: 6px; margin: 2px 8px; }
    .code-block { border-radius: 8px; }
    .tip-box, .challenge-box, .info-box, .concept-box { border-radius: 8px; }
    img { border-radius: 8px; }

  
    /* ═══════════════════════════════════════════
       EN MANGO MODE – vollständige Farbumschaltung
       DE = Rot (#DC2626) | EN = Mango (#F7CC00)
       ═══════════════════════════════════════════ */
    [data-lang="en"] { --accent: #F7CC00; --primary: #1A1A1A; }

    /* Texte */
    [data-lang="en"] h1,
    [data-lang="en"] h2,
    [data-lang="en"] h3 { color: #1A1A1A; }
    [data-lang="en"] a  { color: #1A1A1A; }

    /* Bauhaus-Elemente */
    [data-lang="en"] .bauhaus-accent-line { background: #F7CC00; }
    [data-lang="en"] .section-label,
    [data-lang="en"] .label,
    [data-lang="en"] .section-tag  { color: #1A1A1A; border-color: #1A1A1A; }

    /* Header / Navbar */
    [data-lang="en"] .header { border-bottom-color: rgba(0,0,0,0.08); }
    [data-lang="en"] .header-logo { color: #1A1A1A; }
    [data-lang="en"] .lang-btn.active { background: #1A1A1A; color: #F7CC00; border-color: #1A1A1A; }

    /* Sidebar / Navigation */
    [data-lang="en"] .sidebar-link.active,
    [data-lang="en"] .nav-link.active { color: #1A1A1A; border-left-color: #F7CC00; }
    [data-lang="en"] .sidebar-link:hover,
    [data-lang="en"] .nav-link:hover  { color: #1A1A1A; }

    /* Karten + Akzentlinien */
    [data-lang="en"] .card,
    [data-lang="en"] .info-box,
    [data-lang="en"] .phase-card,
    [data-lang="en"] .screen-card   { border-color: rgba(0,0,0,0.12); }
    [data-lang="en"] .screen-header { background: #1A1A1A; }
    [data-lang="en"] .screen-num    { color: #F7CC00; }

    /* Buttons */
    [data-lang="en"] .btn-primary { background: #1A1A1A !important; color: #F7CC00 !important; border-color: #1A1A1A !important; }
    [data-lang="en"] .btn-primary:hover { background: #333 !important; }

    /* Badges + Tags */
    [data-lang="en"] .badge,
    [data-lang="en"] .phase-num,
    [data-lang="en"] .step-num,
    [data-lang="en"] .badge-red    { background: #1A1A1A !important; color: #F7CC00 !important; }

    /* Tipps / Hinweis-Boxen */
    [data-lang="en"] .tip-box { border-left-color: #F7CC00; }

    /* Quiz */
    [data-lang="en"] .quiz-option.correct { background: #f0fdf4; border-color: #16A34A; }
    [data-lang="en"] .quiz-option.incorrect { background: #fef2f2; border-color: #DC2626; }

    /* Progress / Schritte */
    [data-lang="en"] .phase-number,
    [data-lang="en"] .section-num,
    [data-lang="en"] .number-badge { background: #1A1A1A; color: #F7CC00; }

    /* Code-Block Copy-Button */
    [data-lang="en"] .copy-btn { background: #1A1A1A; color: white; }

    /* Spezifische Farb-Overrides */
    [data-lang="en"] *[style*="color: #DC2626"],
    [data-lang="en"] *[style*="color:#DC2626"],
    [data-lang="en"] *[style*="color: #B91C1C"],
    [data-lang="en"] *[style*="color:#B91C1C"] { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="background: #DC2626"],
    [data-lang="en"] *[style*="background:#DC2626"],
    [data-lang="en"] *[style*="background: #B91C1C"],
    [data-lang="en"] *[style*="background:#B91C1C"] { background: #1A1A1A !important; }


    /* ── Lab-spezifische EN-Overrides (Tabellen, Karten, Sidebar, Inline-Styles) ── */

    /* Bauhaus-Badges */
    [data-lang="en"] .bauhaus-badge,
    [data-lang="en"] .bauhaus-badge-red { background: #1A1A1A !important; color: #F7CC00 !important; }

    /* Tabellen-Header */
    [data-lang="en"] th {
      background: #1A1A1A !important;
      color: white !important;
    }

    /* Header-Logo */
    [data-lang="en"] .header-logo { color: #1A1A1A !important; }

    /* Sidebar */
    [data-lang="en"] .sidebar-link.active {
      color: #1A1A1A !important;
      border-left-color: #F7CC00 !important;
      background: rgba(247,204,0,0.06) !important;
    }
    [data-lang="en"] .sidebar-link:hover { color: #1A1A1A !important; background: rgba(0,0,0,0.04) !important; }

    /* Nav-Buttons */
    [data-lang="en"] .nav-btn.primary { background: #1A1A1A !important; border-color: #1A1A1A !important; }
    [data-lang="en"] .nav-btn:hover   { background: #1A1A1A !important; color: white !important; }

    /* Karten-Überschriften */
    [data-lang="en"] .prop-card h4,
    [data-lang="en"] .cat-card h3,
    [data-lang="en"] .cat-card h4,
    [data-lang="en"] .feature-card h4,
    [data-lang="en"] .web-gen-card .gen-label,
    [data-lang="en"] .phase-card h3,
    [data-lang="en"] .principle-title,
    [data-lang="en"] .screen-card h3 { color: #1A1A1A !important; }

    /* Lab-02 spezifisch */
    [data-lang="en"] .phase-num { background: #1A1A1A !important; color: #F7CC00 !important; }
    [data-lang="en"] .figma-steps li::before { background: #DC2626 !important; color: white !important; }
    [data-lang="en"] .method-card h3 { color: #1A1A1A !important; }
    [data-lang="en"] .hmw-example { border-left-color: #F7CC00 !important; }

    /* Lab-03 spezifisch */
    [data-lang="en"] .color-chip-label { color: #1A1A1A !important; }
    [data-lang="en"] .grid-demo-item .label { color: #1A1A1A !important; }

    /* Lab-04 spezifisch */
    [data-lang="en"] .persona-stat-label { color: #1A1A1A !important; }
    [data-lang="en"] .wireframe-label { color: #1A1A1A !important; }

    /* Lab-05/06 spezifisch */
    [data-lang="en"] .flow-arrow { background: #1A1A1A !important; color: white !important; }
    [data-lang="en"] .step-number { background: #1A1A1A !important; color: #F7CC00 !important; }
    [data-lang="en"] .diff-high { background: #1A1A1A !important; }
    [data-lang="en"] .checklist-item.done::before { color: #F7CC00 !important; }

    /* Inline-Style Overrides via RGB-Matching (React rendert hex → rgb) */
    /* rgb(185,28,28) = #B91C1C | rgb(220,38,38) = #DC2626 */
    [data-lang="en"] *[style*="color: rgb(185"] { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="color: rgb(220"] { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="color:rgb(185"]  { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="color:rgb(220"]  { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="background: rgb(185"] { background: #1A1A1A !important; }
    [data-lang="en"] *[style*="background: rgb(220"] { background: #1A1A1A !important; }
    [data-lang="en"] *[style*="background-color: rgb(185"] { background-color: #1A1A1A !important; }
    [data-lang="en"] *[style*="background-color: rgb(220"] { background-color: #1A1A1A !important; }
    [data-lang="en"] *[style*="borderLeftColor: rgb(185"] { border-left-color: #F7CC00 !important; }
    [data-lang="en"] *[style*="borderColor: rgb(185"],
    [data-lang="en"] *[style*="borderColor: rgb(220"]  { border-color: #1A1A1A !important; }

  
    [data-lang="en"] .bauhaus-accent-line { background: #F7CC00 !important; }
  
    [data-lang="en"] .sidebar-link.active { color: #1A1A1A !important; border-left-color: #F7CC00 !important; }
    [data-lang="en"] .concept-box { border-left-color: #F7CC00 !important; background: rgba(247,204,0,0.08) !important; }
    [data-lang="en"] .filled { background: #1A1A1A !important; }
    [data-lang="en"] .incorrect { border-color: #1A1A1A !important; }
    [data-lang="en"] .persona-header { background: #1A1A1A !important; }
    [data-lang="en"] .primary { background: #1A1A1A !important; border-color: #1A1A1A !important; }
    [data-lang="en"] .root { border-color: #F7CC00 !important; }
    [data-lang="en"] .story-num { color: #1A1A1A !important; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({ startOnLoad: true, theme: 'base', themeVariables: { primaryColor: '#6366F1', primaryTextColor: '#1F2937', lineColor: '#6366F1', edgeLabelBackground: '#F9FAFB' }});</script>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;


    const urlLang = new URLSearchParams(window.location.search).get('lang');
    // ─── Translations ─────────────────────────────────────────────────────────
    const t = {
      de: {
        pageTitle: 'Lab 04 – UX Research & Prototyping',
        labLabel: 'INME Lab',
        backLink: '← Übersicht',
        timeEstimate: 'ca. 75 Min',
        labNumber: 'Lab 04',
        sidebarNav: 'Inhalt',
        nav: [
          { href: '#ueberblick',   label: 'Überblick' },
          { href: '#ux-vs-ui',     label: 'UX vs. UI' },
          { href: '#user-research',label: 'User Research' },
          { href: '#personas',     label: 'Personas' },

    function CodeBlock({ code, lang }) {
      const [label, setLabel] = useState(lang === 'de' ? 'Kopieren' : 'Copy');
      function handleCopy() {
        navigator.clipboard.writeText(code).catch(() => {});
        setLabel(lang === 'de' ? 'Kopiert!' : 'Copied!');
        setTimeout(() => setLabel(lang === 'de' ? 'Kopieren' : 'Copy'), 2000);
      }
      return (
        <div className="code-block">
          <button className="copy-btn" onClick={handleCopy}>{label}</button>
          {code}
        </div>
      );
    }

      // Low (frustrated) → low-mid → neutral → up → up → higher → high → peak
      const points = "20,80 80,90 160,70 240,40 310,35 385,28 460,18 540,14";
      return (
        <div className="emotion-curve">
          <div style={{ fontSize: '0.8rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: '#888', marginBottom: '0.4rem' }}>{label}</div>
          <svg width="560" height="110" style={{ maxWidth: '100%', display: 'block' }}>
            <defs>
              <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#ef4444" />
                <stop offset="40%" stopColor="#DC2626" />
                <stop offset="100%" stopColor="#22c55e" />

            {/* curve */}

            {/* dots */}
            {points.split(' ').map((pt, i) => {

    // ─── Quiz ─────────────────────────────────────────────────────────────────
    function QuizSection({ tr }) {
      const [answers, setAnswers] = useState({});
      const [submitted, setSubmitted] = useState({});

      function handleAnswer(qi, oi) {
        if (submitted[qi]) return;
        setAnswers(prev => ({ ...prev, [qi]: oi }));
        setSubmitted(prev => ({ ...prev, [qi]: true }));
      }

      function handleReset() {
        setAnswers({});
        setSubmitted({});
      }

      const total = tr.s10Questions.length;
      const answeredAll = Object.keys(submitted).length === total;
      const score = tr.s10Questions.reduce((acc, q, i) => acc + (answers[i] === q.correct ? 1 : 0), 0);

      return (
        <div>
          <p style={{ color: '#555', marginBottom: '1.5rem' }}>{tr.s10Intro}</p>
          {tr.s10Questions.map((q, qi) => (
            <div key={qi} className="quiz-question-block">
              <h4>Q{qi + 1} {q.q}</h4>
              {q.options.map((opt, oi) => {
                let cls = 'quiz-option';
                if (submitted[qi]) {
                  if (oi === q.correct) cls += ' correct';
                  else if (oi === answers[qi] && oi !== q.correct) cls += ' wrong';
                }
                return (
                  <button
                    key={oi}
                    className={cls}
                    disabled={!!submitted[qi]}
                    onClick={() => handleAnswer(qi, oi)}
                  >
                    {String.fromCharCode(65 + oi)}) {opt}
                  </button>
                );
              })}
              {submitted[qi] && (
                <div className={`quiz-explanation${answers[qi] !== q.correct ? ' wrong-exp' : ''}`}>
                  {answers[qi] === q.correct ? '✓ ' : '✗ '}{q.explanation}
                </div>
              )}
            </div>
          ))}
          {answeredAll && (
            <div>
              <div className="score-display">{tr.s10ScoreLabel(score, total)} {score === total ? '' : score >= 3 ? '' : '💪'}</div>
              <button
                onClick={handleReset}
                style={{ border: '2px solid #1A1A1A', background: 'white', padding: '0.5rem 1.25rem', fontWeight: 700, cursor: 'pointer', borderRadius: 0, fontFamily: "'Space Grotesk', sans-serif" }}
              >
                {tr.s10Reset}
              </button>
            </div>
          )}
        </div>
      );
    }
