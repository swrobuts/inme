    // ─── CodeBlock with copy button ──────────────────────────────────────────
    function CodeBlock({ code, lang }) {
      const [label, setLabel] = useState(lang === 'de' ? 'Kopieren' : 'Copy');
      function handleCopy() {
        navigator.clipboard.writeText(code).catch(() => {});
        setLabel(lang === 'de' ? 'Kopiert!' : 'Copied!');
        setTimeout(() => setLabel(lang === 'de' ? 'Kopieren' : 'Copy'), 2000);
      }
      return (
        <div className="code-block">
          <button className="copy-btn" onClick={handleCopy}>{label}</button>
          {code}
        </div>
      );
    }

    // ─── Emotion Curve SVG ────────────────────────────────────────────────────
    function EmotionCurve({ label, note }) {
      // Low (frustrated) → low-mid → neutral → up → up → higher → high → peak
      const points = "20,80 80,90 160,70 240,40 310,35 385,28 460,18 540,14";
      return (
        <div className="emotion-curve">
          <div style={{ fontSize: '0.8rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: '#888', marginBottom: '0.4rem' }}>{label}</div>
          <svg width="560" height="110" style={{ maxWidth: '100%', display: 'block' }}>
            <defs>
              <linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stopColor="#ef4444" />
                <stop offset="40%" stopColor="#F59E0B" />
                <stop offset="100%" stopColor="#22c55e" />
              </linearGradient>
            </defs>
            {/* grid lines */}
            <line x1="20" y1="20" x2="20" y2="95" stroke="#e5e7eb" strokeWidth="1"/>
            <line x1="20" y1="95" x2="545" y2="95" stroke="#e5e7eb" strokeWidth="1"/>
            {/* zone labels */}
            <text x="24" y="92" fontSize="9" fill="#aaa">😤</text>
            <text x="24" y="70" fontSize="9" fill="#aaa">😐</text>
            <text x="24" y="38" fontSize="9" fill="#aaa">😊</text>
            <text x="24" y="18" fontSize="9" fill="#aaa">😄</text>
            {/* curve */}
            <polyline
              points={points}
              fill="none"
              stroke="url(#curveGrad)"
              strokeWidth="3"
              strokeLinejoin="round"
              strokeLinecap="round"
            />
            {/* dots */}
            {points.split(' ').map((pt, i) => {
              const [x, y] = pt.split(',').map(Number);
              return <circle key={i} cx={x} cy={y} r="4" fill="white" stroke="#B91C1C" strokeWidth="2"/>;
            })}
            {/* step labels */}
            {['1','2','3','4','5','6','7','8'].map((n, i) => {
              const pts = points.split(' ');
              const [x] = pts[i].split(',').map(Number);
              return <text key={i} x={x} y={108} fontSize="9" fill="#888" textAnchor="middle">{n}</text>;
            })}
          </svg>
          <div style={{ fontSize: '0.78rem', color: '#888', marginTop: '0.25rem' }}>{note}</div>
        </div>
      );
    }

    // ─── Quiz ─────────────────────────────────────────────────────────────────
    function QuizSection({ tr }) {
      const [answers, setAnswers] = useState({});
      const [submitted, setSubmitted] = useState({});

      function handleAnswer(qi, oi) {
        if (submitted[qi]) return;
        setAnswers(prev => ({ ...prev, [qi]: oi }));
        setSubmitted(prev => ({ ...prev, [qi]: true }));
      }

      function handleReset() {
        setAnswers({});
        setSubmitted({});
      }

      const total = tr.s10Questions.length;
      const answeredAll = Object.keys(submitted).length === total;
      const score = tr.s10Questions.reduce((acc, q, i) => acc + (answers[i] === q.correct ? 1 : 0), 0);

      return (
        <div>
          <p style={{ color: '#555', marginBottom: '1.5rem' }}>{tr.s10Intro}</p>
          {tr.s10Questions.map((q, qi) => (
            <div key={qi} className="quiz-question-block">
              <h4>{qi + 1}. {q.q}</h4>
              {q.options.map((opt, oi) => {
                let cls = 'quiz-option';
                if (submitted[qi]) {
                  if (oi === q.correct) cls += ' correct';
                  else if (oi === answers[qi] && oi !== q.correct) cls += ' wrong';
                }
                return (
                  <button
                    key={oi}
                    className={cls}
                    disabled={!!submitted[qi]}
                    onClick={() => handleAnswer(qi, oi)}
                  >
                    {String.fromCharCode(65 + oi)}) {opt}
                  </button>
                );
              })}
              {submitted[qi] && (
                <div className={`quiz-explanation${answers[qi] !== q.correct ? ' wrong-exp' : ''}`}>
                  {answers[qi] === q.correct ? '✓ ' : '✗ '}{q.explanation}
                </div>
              )}
            </div>
          ))}
          {answeredAll && (
            <div>
              <div className="score-display">{tr.s10ScoreLabel(score, total)} {score === total ? '🎉' : score >= 3 ? '👍' : '💪'}</div>
              <button
                onClick={handleReset}
                style={{ border: '2px solid #1A1A1A', background: 'white', padding: '0.5rem 1.25rem', fontWeight: 700, cursor: 'pointer', borderRadius: 0, fontFamily: "'Space Grotesk', sans-serif" }}
              >
                {tr.s10Reset}
              </button>
            </div>
          )}
        </div>
      );
    }

                  <div key={i} className="method-card">
                    <div className="m-icon">{m.icon}</div>
                    <h4>{m.title}</h4>
                    <p>{m.desc}</p>
                  </div>
                ))}
              </div>
              <div className="tip-box">
                <strong>{tr.s3Tip}</strong>
              </div>
              <div className="info-box">
                <strong>{tr.s3InfoTitle}</strong>
                <p style={{ margin: '0.4rem 0 0', fontSize: '0.9rem' }}>{tr.s3InfoText}</p>
                <ul style={{ margin: '0.4rem 0 0', paddingLeft: '1.2rem', fontSize: '0.9rem' }}>
                  {tr.s3InfoStats.map((s, i) => <li key={i} style={{ marginBottom: '0.2rem' }}>{s}</li>)}
                </ul>
              </div>
            </section>

            {/* ── Personas ── */}
            <section id="personas" className="section-block">
              <h2>{tr.s4Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <div className="concept-box">
                <strong>{tr.s4ConceptTitle}</strong>
                <p style={{ margin: '0.4rem 0 0', fontSize: '0.92rem' }}>{tr.s4ConceptText}</p>
              </div>
              <div className="persona-card">
                <div className="persona-header">
                  <div className="p-name">👤 {tr.s4PersonaName}</div>
                  <div className="p-role">{tr.s4PersonaRole}</div>
                </div>
                <div className="persona-section">
                  <h4>{tr.s4ZieleTitle}</h4>
                  <ul>{tr.s4Ziele.map((z, i) => <li key={i}>{z}</li>)}</ul>
                </div>
                <div className="persona-section">
                  <h4>{tr.s4FrustrTitle}</h4>
                  <ul>{tr.s4Frustr.map((f, i) => <li key={i}>{f}</li>)}</ul>
                </div>
                <div className="persona-section">
                  <h4>{tr.s4KontextTitle}</h4>
                  <ul>{tr.s4Kontext.map((k, i) => <li key={i}>{k}</li>)}</ul>
                </div>
                <div className="persona-section">
                  <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.4rem' }}>
                    <span style={{ fontSize: '0.82rem', fontWeight: 700 }}>{tr.s4AffinityLabel}</span>
                    <div className="persona-affinity">
                      {[1,2,3,4,5].map(n => <span key={n} className={`dot ${n <= 3 ? 'filled' : 'empty'}`}></span>)}
                    </div>
                    <span style={{ fontSize: '0.82rem', color: '#666' }}>({tr.s4AffinityDesc})</span>
                  </div>
                  <div className="persona-quote">{tr.s4Quote}</div>
                </div>
              </div>
              <h3 style={{ marginTop: '2rem' }}>{tr.s4TemplateTitle}</h3>
              <CodeBlock code={tr.s4TemplateCode} lang={lang} />
            </section>

            {/* ── User Journey ── */}
            <section id="user-journey" className="section-block">
              <h2>{tr.s5Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <p style={{ color: '#555', fontStyle: 'italic', marginBottom: '1rem' }}>{tr.s5Subtitle}</p>
              <div style={{ overflowX: 'auto' }}>
                <table className="journey-table">
                  <thead>
                    <tr>{tr.s5TableHeaders.map((h, i) => <th key={i}>{h}</th>)}</tr>
                  </thead>
                  <tbody>
                    {tr.s5Rows.map((row, i) => (
                      <tr key={i}>
                        {row.map((cell, j) => (
                          <td key={j} style={j === 0 ? { fontWeight: 600, fontFamily: "'Space Grotesk', sans-serif", whiteSpace: 'nowrap' } : {}}>
                            {cell}
                          </td>
                        ))}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <EmotionCurve label={tr.s5CurveLabel} note={tr.s5CurveNote} />
            </section>

            {/* ── User Stories ── */}
            <section id="user-stories" className="section-block">
              <h2>{tr.s6Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <div className="concept-box" style={{ marginBottom: '1.25rem' }}>
                <strong>{tr.s6Intro}</strong>
              </div>
              {tr.s6Stories.map((s, i) => (
                <div key={i} className="user-story-card">
                  <div className="story-num">{s.num}</div>
                  <span>
                    {s.text[0]}
                    <strong style={{ color: '#B91C1C' }}>{s.text[1]}</strong>
                    {s.text[2]}
                  </span>
                </div>
              ))}
            </section>

            {/* ── IA ── */}
            <section id="ia" className="section-block">
              <h2>{tr.s7Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <p style={{ color: '#555', fontStyle: 'italic' }}>{tr.s7Subtitle}</p>
              <div className="sitemap">
                <div className="root">HOME</div>
                <div><span className="connector">└── </span><span className="node">Störung melden (Screen 1)</span></div>
                <div><span className="connector">    └── </span><span className="node">Diagnose (Screen 2)</span></div>
                <div><span className="connector">        └── </span><span className="node">Ersatzteilshop (Screen 3)</span></div>
                <div><span className="connector">            └── </span><span className="node">Bestellung bestätigen (Screen 4)</span></div>
              </div>
              <div className="info-box" style={{ marginTop: '1rem' }}>
                <strong>{tr.s7Note}</strong>
              </div>
            </section>

            {/* ── Wireframes ── */}
            <section id="wireframes" className="section-block">
              <h2>{tr.s8Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <p style={{ color: '#555', marginBottom: '0.75rem' }}>{tr.s8Intro}</p>
              <CodeBlock code={tr.s8Wire} lang={lang} />
              <div className="tip-box" style={{ marginTop: '1rem' }}>
                <strong>💡 </strong>{tr.s8Tip}
              </div>
            </section>

            {/* ── Figma ── */}
            <section id="figma" className="section-block">
              <h2>{tr.s9Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <ol className="figma-steps">
                {tr.s9Steps.map((step, i) => (
                  <li key={i}>
                    <span>
                      <strong>{step.title}:</strong> {step.desc}
                    </span>
                  </li>
                ))}
              </ol>
              <div className="info-box">
                <strong>ℹ️ </strong>{tr.s9InfoText}
              </div>
              <div className="challenge-box" style={{ marginTop: '0.75rem' }}>
                <strong>🎯 </strong>{tr.s9Challenge}
              </div>
            </section>

            {/* ── Quiz ── */}
            <section id="quiz" className="section-block">
              <h2>{tr.s10Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <QuizSection tr={tr} key={lang} />
            </section>

            {/* ── Ressourcen ── */}
            <section id="ressourcen" className="section-block">
              <h2>{tr.s11Title}</h2>
              <div className="bauhaus-accent-line"></div>
              <ul className="resource-links">
                {tr.s11Links.map((l, i) => (
                  <li key={i}>
                    <a href={l.href} target="_blank" rel="noopener noreferrer">{l.label}</a>
                    <span className="res-desc">{l.desc}</span>
                  </li>
                ))}
              </ul>
            </section>

            {/* ── Bottom Nav ── */}
            <nav className="nav-bottom">
              <a href="lab-03-gestaltung.html" className="nav-btn">{tr.navPrev}</a>
              <a href="lab-05-usecase.html" className="nav-btn primary">{tr.navNext}</a>
            </nav>

          </main>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
