<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 06 – Implementierung: Supabase + CodePen | INME Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --primary: #B91C1C;
      --accent: #DC2626;
      --dark: #1A1A1A;
      --light-bg: #FAFAFA;
      --primary-light: rgba(185,28,28,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #FAFAFA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; color: #1A1A1A; }
    h2 { color: #B91C1C; font-weight: 800; font-family: 'Space Grotesk', sans-serif; margin-top: 0; }
    h3 { color: #B91C1C; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    h4 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; margin: 0.5rem 0; }
    p { line-height: 1.7; }

    /* Bauhaus */
    .bauhaus-card { border: 2px solid #1A1A1A; border-radius: 0; padding: 1.5rem; background: white; }
    .bauhaus-accent-line { width: 48px; height: 4px; background: #DC2626; margin: 0.5rem 0 1rem 0; }
    .bauhaus-badge { background: #DC2626; color: white; padding: 0.2rem 0.7rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 0; display: inline-block; }

    /* Code */
    .code-block { background: #F3F4F6; color: #1A1A1A; padding: 1.25rem; border-left: 4px solid #D1D5DB; font-family: monospace; font-size: 0.82rem; overflow-x: auto; position: relative; border-radius: 0; white-space: pre; margin: 1rem 0; }
    .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: #1A1A1A; color: white; border: none; padding: 0.25rem 0.6rem; font-size: 0.75rem; font-weight: 700; cursor: pointer; border-radius: 0; }
    .copy-btn:hover { background: #D97706; }

    /* Info boxes */
    .tip-box { border-left: 4px solid #DC2626; background: #fafafa; padding: 1rem 1.25rem; margin: 1rem 0; }
    .info-box { border-left: 4px solid #3b82f6; background: #eff6ff; padding: 1rem 1.25rem; margin: 1rem 0; }
    .concept-box { border-left: 4px solid #B91C1C; background: rgba(185,28,28,0.08); padding: 1rem 1.25rem; margin: 1rem 0; }
    .challenge-box { border-left: 4px solid #22c55e; background: #f0fdf4; padding: 1rem 1.25rem; margin: 1rem 0; }

    /* Quiz */
    .quiz-option { display: block; width: 100%; text-align: left; padding: 0.75rem 1rem; margin: 0.4rem 0; border: 2px solid #e5e7eb; border-radius: 0; background: white; cursor: pointer; font-size: 0.95rem; transition: border-color 0.15s, background 0.15s; }
    .quiz-option:hover:not(:disabled) { border-color: #B91C1C; background: rgba(185,28,28,0.04); }
    .quiz-option.correct { border-color: #22c55e; background: #f0fdf4; color: #166534; font-weight: 600; }
    .quiz-option.wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
    .quiz-option:disabled { cursor: default; }

    /* Layout */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 100;
      background: white; border-bottom: 1px solid #E5E7EB; box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
    }
    .header-left { display: flex; align-items: center; gap: 1.5rem; }
    .header-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.1rem; color: #B91C1C; text-decoration: none; }
    .header-back { font-size: 0.85rem; color: #555; text-decoration: none; font-weight: 500; }
    .header-back:hover { color: #B91C1C; }
    .lang-btn { border: 2px solid #1A1A1A; background: white; padding: 0.2rem 0.6rem; font-size: 0.78rem; font-weight: 700; cursor: pointer; border-radius: 0; letter-spacing: 0.05em; }
    .lang-btn.active { background: #DC2626; color: white; }
    .lang-btn:hover:not(.active) { background: #f5f5f5; }

    .sidebar {
      position: fixed; top: 56px; left: 0; width: 260px;
      height: calc(100vh - 56px); overflow-y: auto;
      border-right: 1px solid #E5E7EB; background: white;
      padding: 1.5rem 0;
    }
    .sidebar-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: #888; padding: 0 1.25rem; margin-bottom: 0.75rem; }
    .sidebar-link {
      display: block; padding: 0.55rem 1.25rem; font-size: 0.88rem; color: #444;
      text-decoration: none; border-left: 3px solid transparent;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      font-weight: 500;
    }
    .sidebar-link:hover { color: #B91C1C; background: rgba(185,28,28,0.04); }
    .sidebar-link.active { color: #B91C1C; border-left-color: #B91C1C; background: rgba(185,28,28,0.06); font-weight: 700; }

    .main-content {
      margin-left: 260px; padding-top: 72px; padding-bottom: 4rem;
      padding-left: 3rem; padding-right: 3rem; max-width: 960px;
    }

    .section-block { margin-bottom: 4rem; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
    th { background: #DC2626; color: white; padding: 0.65rem 1rem; text-align: left; font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 0.82rem; letter-spacing: 0.05em; }
    td { padding: 0.6rem 1rem; border-bottom: 1px solid #e5e7eb; }
    tr:nth-child(even) td { background: #f9fafb; }
    tr:hover td { background: rgba(185,28,28,0.03); }

    /* Nav bottom */
    .nav-bottom { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; padding: 1.5rem 0; }
    .nav-btn { border: 2px solid #1A1A1A; background: white; padding: 0.65rem 1.25rem; font-size: 0.9rem; font-weight: 700; cursor: pointer; text-decoration: none; color: #1A1A1A; font-family: 'Space Grotesk', sans-serif; display: inline-block; border-radius: 0; }
    .nav-btn:hover { background: #DC2626; color: white; }
    .nav-btn.primary { background: #B91C1C; border-color: #B91C1C; color: white; }
    .nav-btn.primary:hover { background: #991b1b; border-color: #991b1b; }

    /* Quiz section */
    .quiz-question-block { margin-bottom: 2rem; padding: 1.5rem; border: 2px solid #e5e7eb; background: white; }
    .quiz-question-block h4 { margin: 0 0 1rem; font-size: 1rem; line-height: 1.5; }
    .quiz-explanation { margin-top: 0.75rem; padding: 0.75rem 1rem; background: #f0fdf4; border-left: 3px solid #22c55e; font-size: 0.88rem; color: #166534; }
    .quiz-explanation.wrong-exp { background: #fef2f2; border-left-color: #ef4444; color: #991b1b; }
    .score-display { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; font-weight: 700; margin: 1.5rem 0 1rem; color: #1A1A1A; }

    /* Flow visual */
    .flow-visual { display: flex; align-items: center; gap: 0; margin: 1.5rem 0; flex-wrap: wrap; }
    .flow-step { border: 2px solid #1A1A1A; padding: 0.85rem 1.25rem; background: white; text-align: center; min-width: 130px; }
    .flow-step .flow-icon { font-size: 1.5rem; display: block; margin-bottom: 0.3rem; }
    .flow-step .flow-label { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.82rem; color: #1A1A1A; }
    .flow-arrow { background: #DC2626; color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }

    /* Setup steps */
    .setup-steps { list-style: none; padding: 0; margin: 1.5rem 0; counter-reset: step-counter; }
    .setup-step { display: flex; gap: 1.25rem; padding: 1.1rem 1.25rem; border: 2px solid #e5e7eb; border-bottom: none; background: white; align-items: flex-start; }
    .setup-step:last-child { border-bottom: 2px solid #e5e7eb; }
    .setup-step-num { background: #B91C1C; color: white; font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1rem; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .setup-step-content { flex: 1; }
    .setup-step-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.95rem; margin-bottom: 0.25rem; color: #1A1A1A; }
    .setup-step-desc { font-size: 0.88rem; color: #555; line-height: 1.55; }
    .setup-step-desc code { background: #f3f4f6; padding: 0.1rem 0.35rem; font-family: monospace; font-size: 0.85em; border: 1px solid #e5e7eb; }

    /* Codepen steps */
    .codepen-steps { list-style: none; padding: 0; margin: 1.5rem 0; }
    .codepen-step { display: flex; gap: 1.25rem; padding: 1rem 1.25rem; margin-bottom: 0.75rem; background: white; border: 2px solid #e5e7eb; align-items: flex-start; }
    .codepen-step-circle { background: #B91C1C; color: white; font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.1rem; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .codepen-step-body { flex: 1; }
    .codepen-step-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .codepen-step-desc { font-size: 0.88rem; color: #555; line-height: 1.5; }

    /* Extension cards */
    .ext-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.5rem 0; }
    .ext-card { border: 2px solid #e5e7eb; padding: 1.25rem; background: white; border-top: 3px solid #B91C1C; }
    .ext-card h4 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.95rem; margin: 0.5rem 0 0.4rem; color: #1A1A1A; }
    .ext-card p { font-size: 0.85rem; color: #555; margin: 0; line-height: 1.55; }
    .diff-badge { font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.5rem; text-transform: uppercase; letter-spacing: 0.08em; border-radius: 0; display: inline-block; }
    .diff-medium { background: #DC2626; color: white; }
    .diff-advanced { background: #B91C1C; color: white; }

    /* SQL explanation list */
    .sql-explain { list-style: none; padding: 0; margin: 1rem 0; }
    .sql-explain li { padding: 0.55rem 0; border-bottom: 1px solid #e5e7eb; font-size: 0.9rem; display: flex; gap: 0.75rem; align-items: flex-start; }
    .sql-explain li:last-child { border-bottom: none; }
    .sql-table-name { font-family: monospace; background: #DC2626; color: white; padding: 0.1rem 0.4rem; font-size: 0.82rem; flex-shrink: 0; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; padding-left: 1.25rem; padding-right: 1.25rem; }
      .ext-grid { grid-template-columns: 1fr; }
      .flow-visual { flex-direction: column; align-items: flex-start; }
      .flow-arrow { transform: rotate(90deg); }
    }
  
    /* v2.0 Modern Upgrades */
    a { color: var(--primary); }
    button { transition: all 0.2s ease; }
    button:hover { opacity: 0.85; transform: translateY(-1px); }
    .sidebar-item { border-radius: 6px; margin: 2px 8px; }
    .code-block { border-radius: 8px; }
    .tip-box, .challenge-box, .info-box, .concept-box { border-radius: 8px; }
    img { border-radius: 8px; }

  
    /* ═══════════════════════════════════════════
       EN MANGO MODE – vollständige Farbumschaltung
       DE = Rot (#DC2626) | EN = Mango (#F7CC00)
       ═══════════════════════════════════════════ */
    [data-lang="en"] { --accent: #F7CC00; --primary: #1A1A1A; }

    /* Texte */
    [data-lang="en"] h1,
    [data-lang="en"] h2,
    [data-lang="en"] h3 { color: #1A1A1A; }
    [data-lang="en"] a  { color: #1A1A1A; }

    /* Bauhaus-Elemente */
    [data-lang="en"] .bauhaus-accent-line { background: #F7CC00; }
    [data-lang="en"] .section-label,
    [data-lang="en"] .label,
    [data-lang="en"] .section-tag  { color: #1A1A1A; border-color: #1A1A1A; }

    /* Header / Navbar */
    [data-lang="en"] .header { border-bottom-color: rgba(0,0,0,0.08); }
    [data-lang="en"] .header-logo { color: #1A1A1A; }
    [data-lang="en"] .lang-btn.active { background: #1A1A1A; color: #F7CC00; border-color: #1A1A1A; }

    /* Sidebar / Navigation */
    [data-lang="en"] .sidebar-link.active,
    [data-lang="en"] .nav-link.active { color: #1A1A1A; border-left-color: #F7CC00; }
    [data-lang="en"] .sidebar-link:hover,
    [data-lang="en"] .nav-link:hover  { color: #1A1A1A; }

    /* Karten + Akzentlinien */
    [data-lang="en"] .card,
    [data-lang="en"] .info-box,
    [data-lang="en"] .phase-card,
    [data-lang="en"] .screen-card   { border-color: rgba(0,0,0,0.12); }
    [data-lang="en"] .screen-header { background: #1A1A1A; }
    [data-lang="en"] .screen-num    { color: #F7CC00; }

    /* Buttons */
    [data-lang="en"] .btn-primary { background: #1A1A1A !important; color: #F7CC00 !important; border-color: #1A1A1A !important; }
    [data-lang="en"] .btn-primary:hover { background: #333 !important; }

    /* Badges + Tags */
    [data-lang="en"] .badge,
    [data-lang="en"] .phase-num,
    [data-lang="en"] .step-num,
    [data-lang="en"] .badge-red    { background: #1A1A1A !important; color: #F7CC00 !important; }

    /* Tipps / Hinweis-Boxen */
    [data-lang="en"] .tip-box { border-left-color: #F7CC00; }

    /* Quiz */

    [data-lang="en"] .quiz-option.incorrect { background: #fef2f2; border-color: #DC2626; }

    /* Progress / Schritte */
    [data-lang="en"] .phase-number,
    [data-lang="en"] .section-num,
    [data-lang="en"] .number-badge { background: #1A1A1A; color: #F7CC00; }

    /* Code-Block Copy-Button */
    [data-lang="en"] .copy-btn { background: #1A1A1A; color: white; }

    /* Spezifische Farb-Overrides */
    [data-lang="en"] *[style*="color: #DC2626"],
    [data-lang="en"] *[style*="color:#DC2626"],
    [data-lang="en"] *[style*="color: #B91C1C"],
    [data-lang="en"] *[style*="color:#B91C1C"] { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="background: #DC2626"],
    [data-lang="en"] *[style*="background:#DC2626"],
    [data-lang="en"] *[style*="background: #B91C1C"],
    [data-lang="en"] *[style*="background:#B91C1C"] { background: #1A1A1A !important; }


    /* ── Lab-spezifische EN-Overrides (Tabellen, Karten, Sidebar, Inline-Styles) ── */

    /* Bauhaus-Badges */
    [data-lang="en"] .bauhaus-badge,
    [data-lang="en"] .bauhaus-badge-red { background: #1A1A1A !important; color: #F7CC00 !important; }

    /* Tabellen-Header */
    [data-lang="en"] th {
      background: #1A1A1A !important;
      color: white !important;
    }

    /* Header-Logo */
    [data-lang="en"] .header-logo { color: #1A1A1A !important; }

    /* Sidebar */
    [data-lang="en"] .sidebar-link.active {
      color: #1A1A1A !important;
      border-left-color: #F7CC00 !important;
      background: rgba(247,204,0,0.06) !important;
    }
    [data-lang="en"] .sidebar-link:hover { color: #1A1A1A !important; background: rgba(0,0,0,0.04) !important; }

    /* Nav-Buttons */
    [data-lang="en"] .nav-btn.primary { background: #1A1A1A !important; border-color: #1A1A1A !important; }
    [data-lang="en"] .nav-btn:hover   { background: #1A1A1A !important; color: white !important; }

    /* Karten-Überschriften */
    [data-lang="en"] .prop-card h4,
    [data-lang="en"] .cat-card h3,
    [data-lang="en"] .cat-card h4,
    [data-lang="en"] .feature-card h4,
    [data-lang="en"] .web-gen-card .gen-label,
    [data-lang="en"] .phase-card h3,
    [data-lang="en"] .principle-title,
    [data-lang="en"] .screen-card h3 { color: #1A1A1A !important; }

    /* Lab-02 spezifisch */
    [data-lang="en"] .phase-num { background: #1A1A1A !important; color: #F7CC00 !important; }
    [data-lang="en"] .figma-steps li::before { background: #DC2626 !important; color: white !important; }
    [data-lang="en"] .method-card h3 { color: #1A1A1A !important; }

    /* Lab-03 spezifisch */

    /* Lab-04 spezifisch */

    [data-lang="en"] .wireframe-label { color: #1A1A1A !important; }

    /* Lab-05/06 spezifisch */
    [data-lang="en"] .flow-arrow { background: #1A1A1A !important; color: white !important; }
    [data-lang="en"] .step-number { background: #1A1A1A !important; color: #F7CC00 !important; }
    [data-lang="en"] .diff-high { background: #1A1A1A !important; }
    [data-lang="en"] .checklist-item.done::before { color: #F7CC00 !important; }

    [data-lang="en"] .lernziele-heading { color: #1A1A1A !important; }

    [data-lang="en"] .lernziele-box { border-left-color: #1A1A1A !important; }

    /* Inline-Style Overrides via RGB-Matching (React rendert hex → rgb) */

    [data-lang="en"] *[style*="color: rgb(185"] { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="color: rgb(220"] { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="color:rgb(185"]  { color: #1A1A1A !important; }

    const SQL_CODE = `-- ═══════════════════════════════════════════
-- INME Lab – Kaffeemaschinen-Störungsmelder
-- Datenbankschema für Supabase
-- ═══════════════════════════════════════════

-- Tabelle: Störungsmeldungen
CREATE TABLE stoerungen (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  maschinentyp TEXT NOT NULL,
  fehlercode TEXT,
  symptome TEXT[],
  beschreibung TEXT,
  diagnose TEXT,
  status TEXT DEFAULT 'offen'
    CHECK (status IN ('offen', 'in_bearbeitung', 'geloest')),
  loesung TEXT
);

-- Tabelle: Ersatzteilkatalog
CREATE TABLE ersatzteile (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  name TEXT NOT NULL,
  beschreibung TEXT,
  preis DECIMAL(10,2),
  kategorie TEXT,
  lagerbestand INT DEFAULT 0,
  bild_url TEXT
);

-- Tabelle: Bestellungen
CREATE TABLE bestellungen (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  created_at TIMESTAMPTZ DEFAULT NOW(),
  stoerung_id UUID REFERENCES stoerungen(id),
  kundename TEXT,
  email TEXT,
  status TEXT DEFAULT 'offen'
);

-- Tabelle: Bestellpositionen
CREATE TABLE bestellpositionen (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  bestellung_id UUID REFERENCES bestellungen(id),
  ersatzteil_id UUID REFERENCES ersatzteile(id),
  menge INT DEFAULT 1
);

-- Demo-Daten: Ersatzteile
INSERT INTO ersatzteile
  (name, beschreibung, preis, kategorie, lagerbestand)
VALUES
  ('Entkalker Frisia 3-Pack',
   'Original Frisia Entkalker, 3 Tabletten für 3 Entkalkungsvorgänge',
   12.90, 'Reinigung', 150),
  ('Brühgruppe Komplett',
   'Komplette Brühgruppe als Ersatz, kompatibel mit Frisia E-Serie',
   89.00, 'Mechanik', 12),
  ('Dichtungsset Universal',
   '10-teiliges Dichtungsset für alle gängigen Kaffeevollautomaten',
   8.50, 'Dichtungen', 200),
  ('Pumpe VibraFoam 15 Bar',
   'Ersatzpumpe, 15 Bar, Vibrationstyp, universell kompatibel',
   45.00, 'Mechanik', 25),
  ('Dampfventil komplett',
   'Ersatz-Dampfventil inkl. Dichtungen und Schrauben',
   28.90, 'Mechanik', 30),
  ('Reinigungstabletten 30er',
   'Monatliche Reinigung, 30 Tabletten',
   14.90, 'Reinigung', 300);

-- Row Level Security aktivieren (empfohlen)
ALTER TABLE stoerungen ENABLE ROW LEVEL SECURITY;
ALTER TABLE ersatzteile ENABLE ROW LEVEL SECURITY;
ALTER TABLE bestellungen ENABLE ROW LEVEL SECURITY;
ALTER TABLE bestellpositionen ENABLE ROW LEVEL SECURITY;

-- Öffentlicher Lesezugriff für Ersatzteile
CREATE POLICY "Ersatzteile öffentlich lesbar"
  ON ersatzteile FOR SELECT USING (true);

-- Öffentlicher Schreibzugriff für Störungen + Bestellungen
CREATE POLICY "Störungen einfügen"
  ON stoerungen FOR INSERT WITH CHECK (true);
CREATE POLICY "Bestellungen einfügen"
  ON bestellungen FOR INSERT WITH CHECK (true);
CREATE POLICY "Bestellpositionen einfügen"
  ON bestellpositionen FOR INSERT WITH CHECK (true);`;

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + n).classList.add('active');
  window.scrollTo(0, 0);

  // Progress bar (sichtbar ab Screen 1)

  pb.style.display = n >= 1 && n <= 4 ? 'block' : 'none';
  if (n >= 1) {
    const stepMap = { 1: 1, 2: 2, 3: 3, 4: 4 };
    const activeStep = stepMap[n] || 1;
    document.querySelectorAll('.progress-step').forEach(el => {
      el.classList.toggle('active', parseInt(el.dataset.step) === activeStep);
    });
  }

  if (n === 4) ladeErsatzteile();

  // Warenkorb-Badge
  const badge = document.getElementById('cart-badge');
  badge.style.display = warenkorb.length > 0 ? 'block' : 'none';

// ═══════════════════════════════════════════
// FOTO-UPLOAD
// ═══════════════════════════════════════════
function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    currentImageDataUrl = e.target.result;
    currentSampleKey = null;
    document.getElementById('foto-placeholder').style.display = 'none';
    const preview = document.getElementById('foto-preview');
    preview.src = currentImageDataUrl;
    preview.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function handleDrop(event) {
  event.preventDefault();
  const file = event.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) handleFile(file);
}

function loadSampleImage(key) {
  const urls = {
    kalk:        'https://swrobuts.github.io/inme/images/test-kalk-closeup.jpg',
    bruehgruppe: 'https://swrobuts.github.io/inme/images/test-bruehgruppe.jpg',
    pumpe:       'https://swrobuts.github.io/inme/images/test-pumpe.jpg',
    dampf:       'https://swrobuts.github.io/inme/images/test-dampfventil.jpg',
    display:     'https://swrobuts.github.io/inme/images/test-display.jpg'
  };
  const url = urls[key];
  if (!url) return;

  // Als Daten-URL laden für Gemini API
  fetch(url)
    .then(r => r.blob())
    .then(blob => {
      const reader = new FileReader();
      reader.onload = e => {
        currentImageDataUrl = e.target.result;
        currentSampleKey = key;
        document.getElementById('foto-placeholder').style.display = 'none';
        const preview = document.getElementById('foto-preview');
        preview.src = currentImageDataUrl;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(blob);
    })
    .catch(() => {
      // Fallback: URL direkt setzen, Mock-Modus erzwingen
      currentSampleKey = key;
      currentImageDataUrl = null;
      document.getElementById('foto-placeholder').style.display = 'none';
      const preview = document.getElementById('foto-preview');
      preview.src = url;
      preview.style.display = 'block';
    });
}

// ═══════════════════════════════════════════
// SCREEN 1 → 2 → 3: Diagnose starten
// ═══════════════════════════════════════════
async function startDiagnosis() {
  if (!currentImageDataUrl && !currentSampleKey) {
    alert('Bitte zuerst ein Foto hochladen oder ein Testbild wählen!');
    return;
  }

  const apiKey = document.getElementById('gemini-key').value.trim();
  const maschinentyp = document.getElementById('maschinentyp').value;

  // Analyse-Screen anzeigen
  const analyseImg = document.getElementById('analyse-foto');
  if (currentImageDataUrl) analyseImg.src = currentImageDataUrl;
  else analyseImg.src = document.getElementById('foto-preview').src;
  showScreen(2);

  let diagnose;

  if (apiKey) {
    // ── Gemini Vision API ──
    try {
      diagnose = await analyzeWithGemini(apiKey, currentImageDataUrl || analyseImg.src, maschinentyp);
    } catch (err) {
      console.warn('Gemini API Fehler:', err.message);
      diagnose = getMockDiagnose();
    }
  } else {
    // ── Mock-Modus ──
    await new Promise(r => setTimeout(r, 1800)); // kurze Denkpause
    diagnose = getMockDiagnose();
  }

  aktuelleStorung = { maschinentyp, diagnose };
  zeigeDiagnose(diagnose);
  speichereStorung(maschinentyp, diagnose);
  showScreen(3);
}

function getMockDiagnose() {
  if (currentSampleKey && MOCK_DIAGNOSEN[currentSampleKey]) {
    return MOCK_DIAGNOSEN[currentSampleKey];
  }

// ═══════════════════════════════════════════
// GEMINI VISION API
// ═══════════════════════════════════════════
async function analyzeWithGemini(apiKey, imageDataUrl, maschinentyp) {
  const base64 = imageDataUrl.split(',')[1];
  const mimeType = imageDataUrl.split(';')[0].split(':')[1];

  const prompt = \`Du bist ein Kaffeemaschinen-Experte. Analysiere dieses Störungsfoto.
Maschinentyp: \${maschinentyp || 'unbekannt'}.
Antworte NUR mit gültigem JSON (kein Markdown, keine Erklärung):
{
  "problem": "Kurzer Störungsname (max 40 Zeichen)",
  "ursache": "Ursache in 1-2 Sätzen",
  "schwere": "error|warning|info",
  "loesung": ["Schritt 1", "Schritt 2", "Schritt 3"],
  "ersatzteil": "Ersatzteilname oder null"
}\`;

  const response = await fetch(
    'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=' + apiKey,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { text: prompt },
            { inline_data: { mime_type: mimeType, data: base64 } }
          ]
        }],
        generationConfig: { temperature: 0.2, maxOutputTokens: 512 }
      })
    }
  );

  if (!response.ok) throw new Error('Gemini API Fehler: ' + response.status);

  const data = await response.json();
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  const jsonMatch = text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error('Kein JSON in Antwort');
  return JSON.parse(jsonMatch[0]);
}

function zeigeDiagnose(diagnose) {
  const schwereLabel = { error: 'KRITISCH', warning: 'WARNUNG', info: 'HINWEIS' };
  const schwereClass = { error: 'status-error', warning: 'status-warning', info: 'status-info' };

  const schritteHTML = (diagnose.loesung || diagnose.schritte || [])
    .map((s, i) => '<li data-step="' + (i+1) + '">' + s + '</li>')
    .join('');

  document.getElementById('diagnose-container').innerHTML =
    '<div class="diagnose-karte">' +
      '<span class="status-badge ' + (schwereClass[diagnose.schwere] || 'status-info') + '">' +
        (schwereLabel[diagnose.schwere] || 'HINWEIS') +
      '</span>' +
      '<div class="diagnose-name">' + (diagnose.problem || diagnose.name) + '</div>' +
      '<div class="diagnose-ursache">Ursache: ' + diagnose.ursache + '</div>' +
      '<h3 style="margin-bottom:0.75rem">Reparaturanleitung:</h3>' +
      '<ol class="loesung-steps">' + schritteHTML + '</ol>' +
    '</div>';

  document.getElementById('btn-shop-container').style.display =
    diagnose.ersatzteil ? 'block' : 'none';
}

function addToCart(id) {
  const teil = alleErsatzteile.find(t => String(t.id) === String(id));
  if (!teil) return;

  if (!warenkorb.find(t => String(t.id) === String(id))) {
    warenkorb.push(teil);
    const btn = document.getElementById('btn-' + id);
    if (btn) { btn.textContent = '✓ Im Warenkorb'; btn.classList.add('hinzugefuegt'); }
  }

  document.getElementById('warenkorb-section').style.display = 'block';
  aktualisiereWarenkorb();
}

function aktualisiereWarenkorb() {
  const total = warenkorb.reduce((sum, t) => sum + Number(t.preis), 0);
  document.getElementById('warenkorb-items').innerHTML = warenkorb.map(t =>
    '<div style="display:flex;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid #e5e7eb">' +
      '<span>' + t.name + '</span>' +
      '<span style="font-weight:700">€' + Number(t.preis).toFixed(2) + '</span>' +
    '</div>'
  ).join('');
  document.getElementById('warenkorb-total').textContent = '€' + total.toFixed(2);
  document.getElementById('cart-count').textContent = warenkorb.length;
  document.getElementById('cart-badge').style.display = warenkorb.length > 0 ? 'block' : 'none';

  // Bestellsummary aktualisieren
  const el = document.getElementById('bestell-summary');
  if (el) {
    el.innerHTML = '<strong>Bestellübersicht:</strong><br>' +
      warenkorb.map(t => t.name + ' – €' + Number(t.preis).toFixed(2)).join('<br>') +
      '<br><strong>Gesamt: €' + total.toFixed(2) + '</strong>';
  }
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
