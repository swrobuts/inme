<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 02 – Kreativtechniken & Design Thinking | INME Lab</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --primary: #B91C1C;
      --accent: #DC2626;
      --dark: #1A1A1A;
      --light-bg: #FAFAFA;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #FFFFFF;
      color: var(--dark);
    }

    h2 { color: #B91C1C; font-weight: 800; font-family: 'Space Grotesk', sans-serif; }
    h3 { color: #B91C1C; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }

    /* ── Bauhaus design tokens ── */
    .bauhaus-card {
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 1.5rem;
      background: white;
    }

    .bauhaus-accent-line {
      width: 48px;
      height: 4px;
      background: #DC2626;
      margin: 0.5rem 0 1rem 0;
    }

    .bauhaus-badge {
      background: #DC2626;
      color: white;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 0;
      display: inline-block;
    }

    .bauhaus-badge-red {
      background: #B91C1C;
      color: white;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 0;
      display: inline-block;
    }

    .code-block {
      background: #F3F4F6;
      color: #1A1A1A;
      padding: 1.25rem;
      border-left: 4px solid #D1D5DB;
      font-family: monospace;
      font-size: 0.85rem;
      overflow-x: auto;
      position: relative;
      border-radius: 0;
      white-space: pre;
    }

    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: #1A1A1A; color: white;
      border: none;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 0;
      font-family: 'Space Grotesk', sans-serif;
    }

    .copy-btn:hover { background: #D97706; }

    .tip-box {
      border-left: 4px solid #DC2626;
      background: #fafafa;
      padding: 1rem 1.25rem;
      margin: 1rem 0;
    }

    .info-box {
      border-left: 4px solid #3b82f6;
      background: #eff6ff;
      padding: 1rem 1.25rem;
      margin: 1rem 0;
    }

    .concept-box {
      border-left: 4px solid #B91C1C;
      background: rgba(185,28,28,0.08);
      padding: 1rem 1.25rem;
      margin: 1rem 0;
    }

    .challenge-box {
      border-left: 4px solid #22c55e;
      background: #f0fdf4;
      padding: 1rem 1.25rem;
      margin: 1rem 0;
    }

    .quiz-option {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.75rem 1rem;
      margin: 0.4rem 0;
      border: 2px solid #e5e7eb;
      border-radius: 0;
      background: white;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.15s, background 0.15s;
    }

    .quiz-option:hover:not(:disabled) { border-color: #9CA3AF; }
    .quiz-option.correct { border-color: #22c55e; background: #f0fdf4; }
    .quiz-option.wrong   { border-color: #ef4444; background: #fef2f2; }

    /* ── Fixed Navbar ── */
    .navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: white;
      border-bottom: 1px solid #E5E7EB; box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }

    .lang-btn {
      padding: 0.25rem 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      background: transparent;
      color: #1A1A1A;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn.active {
      background: #B91C1C;
      color: white;
      border-color: #B91C1C;
    }

    /* ── Fixed Sidebar ── */
    .sidebar {
      position: fixed;
      top: 56px;
      left: 0;
      width: 260px;
      height: calc(100vh - 56px);
      background: white;
      border-right: 1px solid #E5E7EB;
      overflow-y: auto;
      z-index: 100;
      padding: 1.5rem 0;
    }

    .sidebar-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9CA3AF;
      padding: 0 1.25rem 0.75rem;
    }

    .sidebar-link {
      display: block;
      padding: 0.55rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #374151;
      text-decoration: none;
      border-left: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .sidebar-link:hover {
      color: #B91C1C;
      border-left-color: #DC2626;
      background: #FAFAFA;
    }

    .sidebar-link.active {
      color: #B91C1C;
      border-left-color: #B91C1C;
      font-weight: 700;
      background: rgba(185,28,28,0.04);
    }

    /* ── Main content ── */
    .main-content {
      margin-left: 260px;
      padding-top: 72px;
      min-height: 100vh;
    }

    .content-inner {
      max-width: 960px;
      padding: 2rem 2.5rem 4rem;
    }

    .section-block {
      padding-top: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #E5E7EB;
    }

    .section-block:last-child { border-bottom: none; }

    /* ── Phase flow ── */
    .phase-flow {
      display: flex;
      align-items: stretch;
      gap: 0;
      overflow-x: auto;
      margin: 1.5rem 0;
    }

    .phase-card {
      flex: 1;
      min-width: 140px;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      padding: 1.25rem 1rem;
      background: white;
      text-align: center;
      position: relative;
    }

    .phase-card.active-phase { background: #B91C1C; color: white; }
    .phase-card.active-phase h3 { color: white; }

    .phase-arrow {
      display: flex;
      align-items: center;
      padding: 0 0.25rem;
      font-size: 1.25rem;
      color: #F59E0B;
      font-weight: 700;
      flex-shrink: 0;
    }

    .phase-num {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9CA3AF;
      margin-bottom: 0.25rem;
    }

    .phase-card.active-phase .phase-num { color: rgba(255,255,255,0.7); }

    .phase-emoji { font-size: 1.5rem; margin: 0.25rem 0; }

    .phase-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
      color: #B91C1C;
    }

    .phase-card.active-phase .phase-name { color: white; }

    .phase-desc {
      font-size: 0.75rem;
      color: #6B7280;
      line-height: 1.4;
    }

    .phase-card.active-phase .phase-desc { color: rgba(255,255,255,0.85); }

    /* ── Empathy Map ── */
    .empathy-map {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      border: 2px solid #1A1A1A;
      margin: 1.5rem 0;
    }

    .em-cell {
      border: 1px solid #1A1A1A;
      padding: 1rem;
      min-height: 100px;
    }

    .em-cell-label {
      font-weight: 800;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #B91C1C;
      margin-bottom: 0.5rem;
    }

    .em-cell-hint {
      font-size: 0.8rem;
      color: #6B7280;
      font-style: italic;
      line-height: 1.5;
    }

    .em-center {
      grid-column: 1 / -1;
      background: #DC2626;
      color: white;
      padding: 0.75rem 1rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    /* ── Comparison table ── */
    .compare-table {
      width: 100%;
      border-collapse: collapse;
      border: 2px solid #1A1A1A;
      margin: 1.5rem 0;
    }

    .compare-table th {
      background: #DC2626;
      color: white;
      padding: 0.75rem 1rem;
      text-align: left;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .compare-table td {
      padding: 0.65rem 1rem;
      border: 1px solid #E5E7EB;
      font-size: 0.875rem;
      vertical-align: top;
    }

    .compare-table tr:nth-child(even) td { background: #F9FAFB; }

    /* ── Methods grid ── */
    .methods-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    /* ── Steps list ── */
    .steps-list { list-style: none; padding: 0; margin: 1.5rem 0; }

    .step-item {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 1.25rem;
    }

    .step-num {
      width: 32px;
      height: 32px;
      background: #B91C1C;
      color: white;
      font-weight: 800;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: 'Space Grotesk', sans-serif;
    }

    .step-content { flex: 1; padding-top: 0.25rem; }

    .step-title {
      font-weight: 700;
      font-size: 0.95rem;
      color: #1A1A1A;
      margin-bottom: 0.35rem;
    }

    .step-desc {
      font-size: 0.875rem;
      color: #4B5563;
      line-height: 1.55;
    }

    /* ── Quiz ── */
    .quiz-score {
      background: #DC2626;
      color: white;
      padding: 1rem 1.5rem;
      margin-top: 1.5rem;
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
    }

    /* ── Nav footer ── */
    .lab-nav {
      display: flex;
      gap: 1rem;
      justify-content: space-between;
      padding: 2.5rem 2.5rem;
      border-top: 2px solid #1A1A1A;
      background: white;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .lab-nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      background: white;
      color: #1A1A1A;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .lab-nav-btn:hover { background: #DC2626; color: white; }
    .lab-nav-btn.primary { background: #B91C1C; color: white; border-color: #B91C1C; }
    .lab-nav-btn.primary:hover { background: #991B1B; border-color: #991B1B; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { margin-left: 0; }
      .content-inner { padding: 1.5rem 1rem 4rem; }
      .phase-flow { flex-direction: column; }
      .phase-arrow { transform: rotate(90deg); align-self: center; }
      .methods-grid { grid-template-columns: 1fr; }
      .lab-nav { flex-direction: column; }
    }

    @media (max-width: 500px) {
      .empathy-map { grid-template-columns: 1fr; }
      .em-center { grid-column: 1; }
    }

    /* Figma steps */
    .figma-steps { counter-reset: figma-counter; list-style: none; padding: 0; margin: 1.25rem 0; }

    .figma-steps li {
      counter-increment: figma-counter;
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }

    .figma-steps li::before {
      content: counter(figma-counter);
      background: #DC2626;
      color: white;
      font-weight: 800;
      font-size: 0.75rem;
      min-width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    /* back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.15s;
    }

    .back-link:hover { color: white; }
  
    /* v2.0 Modern Upgrades */
    a { color: var(--primary); }
    button { transition: all 0.2s ease; }
    button:hover { opacity: 0.85; transform: translateY(-1px); }
    .sidebar-item { border-radius: 6px; margin: 2px 8px; }
    .code-block { border-radius: 8px; }
    .tip-box, .challenge-box, .info-box, .concept-box { border-radius: 8px; }
    img { border-radius: 8px; }

  
    /* ═══════════════════════════════════════════
       EN MANGO MODE – vollständige Farbumschaltung
       DE = Rot (#DC2626) | EN = Mango (#F7CC00)
       ═══════════════════════════════════════════ */
    [data-lang="en"] { --accent: #F7CC00; --primary: #1A1A1A; }

    /* Texte */
    [data-lang="en"] h1,
    [data-lang="en"] h2,
    [data-lang="en"] h3 { color: #1A1A1A; }
    [data-lang="en"] a  { color: #1A1A1A; }

    /* Bauhaus-Elemente */
    [data-lang="en"] .bauhaus-accent-line { background: #F7CC00; }
    [data-lang="en"] .section-label,
    [data-lang="en"] .label,
    [data-lang="en"] .section-tag  { color: #1A1A1A; border-color: #1A1A1A; }

    /* Header / Navbar */
    [data-lang="en"] .header { border-bottom-color: rgba(0,0,0,0.08); }
    [data-lang="en"] .header-logo { color: #1A1A1A; }
    [data-lang="en"] .lang-btn.active { background: #1A1A1A; color: #F7CC00; border-color: #1A1A1A; }

    /* Sidebar / Navigation */
    [data-lang="en"] .sidebar-link.active,
    [data-lang="en"] .nav-link.active { color: #1A1A1A; border-left-color: #F7CC00; }
    [data-lang="en"] .sidebar-link:hover,
    [data-lang="en"] .nav-link:hover  { color: #1A1A1A; }

    /* Karten + Akzentlinien */
    [data-lang="en"] .card,
    [data-lang="en"] .info-box,
    [data-lang="en"] .phase-card,
    [data-lang="en"] .screen-card   { border-color: rgba(0,0,0,0.12); }
    [data-lang="en"] .screen-header { background: #1A1A1A; }
    [data-lang="en"] .screen-num    { color: #F7CC00; }

    /* Buttons */
    [data-lang="en"] .btn-primary { background: #1A1A1A !important; color: #F7CC00 !important; border-color: #1A1A1A !important; }
    [data-lang="en"] .btn-primary:hover { background: #333 !important; }

    /* Badges + Tags */
    [data-lang="en"] .badge,
    [data-lang="en"] .phase-num,
    [data-lang="en"] .step-num,
    [data-lang="en"] .badge-red    { background: #1A1A1A !important; color: #F7CC00 !important; }

    /* Tipps / Hinweis-Boxen */
    [data-lang="en"] .tip-box { border-left-color: #F7CC00; }

    /* Quiz */
    [data-lang="en"] .quiz-option.correct { background: #f0fdf4; border-color: #16A34A; }
    [data-lang="en"] .quiz-option.incorrect { background: #fef2f2; border-color: #DC2626; }

    /* Progress / Schritte */
    [data-lang="en"] .phase-number,
    [data-lang="en"] .section-num,
    [data-lang="en"] .number-badge { background: #1A1A1A; color: #F7CC00; }

    /* Code-Block Copy-Button */
    [data-lang="en"] .copy-btn { background: #1A1A1A; color: white; }

    /* Spezifische Farb-Overrides */
    [data-lang="en"] *[style*="color: #DC2626"],
    [data-lang="en"] *[style*="color:#DC2626"],
    [data-lang="en"] *[style*="color: #B91C1C"],
    [data-lang="en"] *[style*="color:#B91C1C"] { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="background: #DC2626"],
    [data-lang="en"] *[style*="background:#DC2626"],
    [data-lang="en"] *[style*="background: #B91C1C"],
    [data-lang="en"] *[style*="background:#B91C1C"] { background: #1A1A1A !important; }


    /* ── Lab-spezifische EN-Overrides (Tabellen, Karten, Sidebar, Inline-Styles) ── */

    /* Bauhaus-Badges */
    [data-lang="en"] .bauhaus-badge,
    [data-lang="en"] .bauhaus-badge-red { background: #1A1A1A !important; color: #F7CC00 !important; }

    /* Tabellen-Header */
    [data-lang="en"] th {
      background: #1A1A1A !important;
      color: white !important;
    }

    /* Header-Logo */
    [data-lang="en"] .header-logo { color: #1A1A1A !important; }

    /* Sidebar */
    [data-lang="en"] .sidebar-link.active {
      color: #1A1A1A !important;
      border-left-color: #F7CC00 !important;
      background: rgba(247,204,0,0.06) !important;
    }
    [data-lang="en"] .sidebar-link:hover { color: #1A1A1A !important; background: rgba(0,0,0,0.04) !important; }

    /* Nav-Buttons */
    [data-lang="en"] .nav-btn.primary { background: #1A1A1A !important; border-color: #1A1A1A !important; }
    [data-lang="en"] .nav-btn:hover   { background: #1A1A1A !important; color: white !important; }

    /* Karten-Überschriften */
    [data-lang="en"] .prop-card h4,
    [data-lang="en"] .cat-card h3,
    [data-lang="en"] .cat-card h4,
    [data-lang="en"] .feature-card h4,
    [data-lang="en"] .web-gen-card .gen-label,
    [data-lang="en"] .phase-card h3,
    [data-lang="en"] .principle-title,
    [data-lang="en"] .screen-card h3 { color: #1A1A1A !important; }

    /* Lab-02 spezifisch */
    .lernziele-heading { color: #DC2626; }
    .lernziele-box { background: #FEF2F2; border-left: 4px solid #DC2626; }
    [data-lang="en"] .lernziele-heading { color: #1A1A1A !important; }
    [data-lang="en"] .lernziele-box { border-left-color: #1A1A1A !important; }
    [data-lang="en"] .summary-heading { color: #1A1A1A !important; }
    [data-lang="en"] .summary-box { border-left-color: #1A1A1A !important; }
    [data-lang="en"] .phase-num { background: #1A1A1A !important; color: #F7CC00 !important; }
    [data-lang="en"] .figma-steps li::before { background: #DC2626 !important; color: white !important; }
    [data-lang="en"] .method-card h3 { color: #1A1A1A !important; }
    [data-lang="en"] .hmw-example { border-left-color: #F7CC00 !important; }

    /* Lab-03 spezifisch */
    [data-lang="en"] .color-chip-label { color: #1A1A1A !important; }
    [data-lang="en"] .grid-demo-item .label { color: #1A1A1A !important; }

    /* Lab-04 spezifisch */
    [data-lang="en"] .persona-stat-label { color: #1A1A1A !important; }
    [data-lang="en"] .wireframe-label { color: #1A1A1A !important; }

    /* Lab-05/06 spezifisch */
    [data-lang="en"] .flow-arrow { background: #1A1A1A !important; color: white !important; }
    [data-lang="en"] .step-number { background: #1A1A1A !important; color: #F7CC00 !important; }
    [data-lang="en"] .diff-high { background: #1A1A1A !important; }
    [data-lang="en"] .checklist-item.done::before { color: #F7CC00 !important; }

    /* Inline-Style Overrides via RGB-Matching (React rendert hex → rgb) */
    /* rgb(185,28,28) = #B91C1C | rgb(220,38,38) = #DC2626 */
    [data-lang="en"] *[style*="color: rgb(185"] { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="color: rgb(220"] { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="color:rgb(185"]  { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="color:rgb(220"]  { color: #1A1A1A !important; }
    [data-lang="en"] *[style*="background: rgb(185"] { background: #1A1A1A !important; }
    [data-lang="en"] *[style*="background: rgb(220"] { background: #1A1A1A !important; }
    [data-lang="en"] *[style*="background-color: rgb(185"] { background-color: #1A1A1A !important; }
    [data-lang="en"] *[style*="background-color: rgb(220"] { background-color: #1A1A1A !important; }
    [data-lang="en"] *[style*="borderLeftColor: rgb(185"] { border-left-color: #F7CC00 !important; }

    /* ── Copy button helper ── */
    function CopyBtn({ text }) {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        navigator.clipboard.writeText(text).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1800);
        }).catch(() => {
          const el = document.createElement('textarea');
          el.value = text;
          document.body.appendChild(el);
          el.select();
          document.execCommand('copy');
          document.body.removeChild(el);
          setCopied(true);
          setTimeout(() => setCopied(false), 1800);
        });
      };
      return <button className="copy-btn" onClick={handleCopy}>{copied ? '✓ Kopiert' : 'Kopieren'}</button>;
    }

    /* ── Code Block ── */
    function CodeBlock({ code }) {
      return (
        <div className="code-block">
          <CopyBtn text={code} />
          {code}
        </div>
      );
    }

    /* ── Quiz Component ── */
    function Quiz({ questions }) {
      const [answers, setAnswers] = useState({});
      const [showScore, setShowScore] = useState(false);

      const handleAnswer = (qi, opt) => {
        if (answers[qi] !== undefined) return;
        setAnswers(prev => ({ ...prev, [qi]: opt }));
      };

      const score = Object.entries(answers).filter(([qi, opt]) => questions[+qi].correct === opt).length;
      const allAnswered = Object.keys(answers).length === questions.length;

      return (
        <div>
          {questions.map((q, qi) => (
            <div key={qi} style={{ marginBottom: '1.75rem' }}>
              <p style={{ fontWeight: 700, marginBottom: '0.5rem', fontSize: '0.95rem' }}>
                <span style={{ color: '#B91C1C', marginRight: '0.5rem' }}>Q{qi + 1}</span>
                {q.question}
              </p>
              {q.options.map((opt, oi) => {
                let cls = 'quiz-option';
                if (answers[qi] !== undefined) {
                  if (oi === q.correct) cls += ' correct';
                  else if (oi === answers[qi]) cls += ' wrong';
                }
                return (
                  <button
                    key={oi}
                    className={cls}
                    onClick={() => handleAnswer(qi, oi)}
                    disabled={answers[qi] !== undefined}
                  >
                    <span style={{ fontWeight: 700, marginRight: '0.5rem', color: '#B91C1C' }}>
                      {['A', 'B', 'C', 'D'][oi]})
                    </span>
                    {opt}
                    {answers[qi] !== undefined && oi === q.correct && (
                      <span style={{ marginLeft: '0.5rem', color: '#16a34a' }}>✓</span>
                    )}
                    {answers[qi] === oi && oi !== q.correct && (
                      <span style={{ marginLeft: '0.5rem', color: '#ef4444' }}>✗</span>
                    )}
                  </button>
                );
              })}
              {answers[qi] !== undefined && (
                <p style={{ fontSize: '0.8rem', color: '#6B7280', marginTop: '0.35rem', paddingLeft: '0.5rem' }}>
                  {q.explanation}
                </p>
              )}
            </div>
          ))}
          {allAnswered && (
            <div className="quiz-score">
              {score}/{questions.length} {score === questions.length ? 'Perfekt!' : score >= 3 ? '— Gut gemacht!' : '— Weiter üben!'}
            </div>
          )}
        </div>
      );
    }
