<html lang="de">
<head>

  <style>
    :root {
      --primary: #B91C1C;
      --accent: #DC2626;
      --dark: #1A1A1A;
      --light-bg: #FAFAFA;
      --primary-light: rgba(185,28,28,0.08);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #FAFAFA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; color: #1A1A1A; }

    h3 { color: #B91C1C; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
    h4 { font-family: 'Space Grotesk', sans-serif; font-weight: 600; margin: 0.5rem 0; }
    p { line-height: 1.7; }

    /* Bauhaus */
    .bauhaus-card { border: 2px solid #1A1A1A; border-radius: 0; padding: 1.5rem; background: white; }
    .bauhaus-accent-line { width: 48px; height: 4px; background: #DC2626; margin: 0.5rem 0 1rem 0; }
    .bauhaus-badge { background: #DC2626; color: white; padding: 0.2rem 0.7rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; border-radius: 0; display: inline-block; }

    /* Code */
    .code-block { background: #F3F4F6; color: #1A1A1A; padding: 1.25rem; border-left: 4px solid #D1D5DB; font-family: monospace; font-size: 0.85rem; overflow-x: auto; position: relative; border-radius: 0; white-space: pre; }
    .copy-btn { position: absolute; top: 0.5rem; right: 0.5rem; background: #1A1A1A; color: white; border: none; padding: 0.25rem 0.6rem; font-size: 0.75rem; font-weight: 700; cursor: pointer; border-radius: 0; }
    .copy-btn:hover { background: #D97706; }

    /* Info boxes */
    .tip-box { border-left: 4px solid #DC2626; background: #fafafa; padding: 1rem 1.25rem; margin: 1rem 0; }
    .info-box { border-left: 4px solid #3b82f6; background: #eff6ff; padding: 1rem 1.25rem; margin: 1rem 0; }
    .concept-box { border-left: 4px solid #B91C1C; background: rgba(185,28,28,0.08); padding: 1rem 1.25rem; margin: 1rem 0; }
    .challenge-box { border-left: 4px solid #22c55e; background: #f0fdf4; padding: 1rem 1.25rem; margin: 1rem 0; }

    /* Quiz */

    .quiz-option:hover:not(:disabled) { border-color: #B91C1C; background: rgba(185,28,28,0.04); }

    .quiz-option.wrong { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
    .quiz-option:disabled { cursor: default; }

    /* Layout */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 100;
      background: white; border-bottom: 1px solid #E5E7EB; box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
    }
    .header-left { display: flex; align-items: center; gap: 1.5rem; }
    .header-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 1.1rem; color: #B91C1C; text-decoration: none; }
    .header-back { font-size: 0.85rem; color: #555; text-decoration: none; font-weight: 500; }
    .header-back:hover { color: #B91C1C; }
    .lang-btn { border: 2px solid #1A1A1A; background: white; padding: 0.2rem 0.6rem; font-size: 0.78rem; font-weight: 700; cursor: pointer; border-radius: 0; letter-spacing: 0.05em; }
    .lang-btn.active { background: #DC2626; color: white; }

    .sidebar {

    .sidebar-link:hover { color: #B91C1C; background: rgba(185,28,28,0.04); }
    .sidebar-link.active { color: #B91C1C; border-left-color: #B91C1C; background: rgba(185,28,28,0.06); font-weight: 700; }

    .main-content {

    td { padding: 0.6rem 1rem; border-bottom: 1px solid #e5e7eb; }

    /* Grid */

    .example-card { border: 2px solid #e5e7eb; padding: 1rem; text-align: center; font-weight: 600; font-size: 0.9rem; background: white; }

<script type="text/babel">
const { useState, useEffect, useRef } = React;


    const urlLang = new URLSearchParams(window.location.search).get('lang');
// ─── COPY BUTTON ───
function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button className="copy-btn" onClick={handleCopy}>
      {copied ? 'Copied!' : 'Copy'}
    </button>
  );
}

// ─── CODE BLOCK ───

        </div>
        <div style={{display:'flex',gap:'4px'}}>
          {[0,1,2].map(i=><div key={i} className="dot" />)}
        </div>
      </div>
    );
  }
  if (type === 'aehnlichkeit') {
    return (
      <div style={{display:'flex',gap:'6px',padding:'12px',background:'#f9fafb',border:'1px solid #e5e7eb',alignItems:'center',flexWrap:'wrap'}}>

        ))}
      </div>
    );
  }
  if (type === 'kontinuität') {
    return (
      <div style={{padding:'12px',background:'#f9fafb',border:'1px solid #e5e7eb'}}>
        <div style={{display:'flex',alignItems:'center',gap:0}}>
          {Array.from({length:8},(_,i) => (
            <div key={i} style={{width:20,height:3,background:i%2===0?'var(--dark)':'transparent'}} />
          ))}
          <div style={{width:0,height:0,borderTop:'6px solid transparent',borderBottom:'6px solid transparent',borderLeft:'10px solid var(--dark)'}} />
        </div>
      </div>
    );
  }
  if (type === 'geschlossenheit') {
    return (
      <div style={{padding:'12px',background:'#f9fafb',border:'1px solid #e5e7eb',display:'flex',gap:'16px',alignItems:'center'}}>
        <div style={{position:'relative',width:36,height:36}}>

          {/* right side gap */}
        </div>
        <div style={{fontSize:'0.8rem',color:'#6b7280'}}>→ □</div>
      </div>
    );
  }
  return null;
}

function SectionQuiz({ lang }) {
  const [current, setCurrent] = useState(0);
  const [answers, setAnswers] = useState(Array(QUIZ_DATA.length).fill(null));
  const [showResult, setShowResult] = useState(false);

  const q = QUIZ_DATA[current];
  const opts = q.options[lang];

  const handleAnswer = (idx) => {
    if (answers[current] !== null) return;
    const newAnswers = [...answers];
    newAnswers[current] = idx;
    setAnswers(newAnswers);
    if (current === QUIZ_DATA.length - 1) {
      setTimeout(() => setShowResult(true), 600);
    } else {
      setTimeout(() => setCurrent(c => c + 1), 800);
    }
  };

  const handleReset = () => {
    setCurrent(0);
    setAnswers(Array(QUIZ_DATA.length).fill(null));
    setShowResult(false);
  };

  const score = answers.filter((a, i) => a === QUIZ_DATA[i].correct).length;

  const t = {
    de: {
      title: 'Quiz',
      question: 'Frage',
      of: 'von',
      next: 'Weiter',
      restart: 'Nochmal',
      score: 'Dein Ergebnis',
      correct: 'richtig',
      feedback: [
        'Weiter üben – schau dir die Inhalte nochmal an!',
        'Solide Basis – noch ein bisschen mehr!',
        'Sehr gut! Du hast die Bauhaus-Prinzipien verstanden.',
        'Perfekt! Meister der Gestaltung!',
      ],
    },
    en: {
      title: 'Quiz',
      question: 'Question',
      of: 'of',
      next: 'Next',
      restart: 'Try again',
      score: 'Your score',
      correct: 'correct',
      feedback: [
        'Keep practicing – review the content again!',
        'Solid start – a bit more to go!',
        'Great! You understand the Bauhaus principles.',
        'Perfect! Master of design!',
      ],
    },
  };
  const c = t[lang];
  const fbIdx = score <= 1 ? 0 : score <= 2 ? 1 : score <= 4 ? 2 : 3;

  return (
    <section id="quiz" className="section-block">
      <h2>{c.title}</h2>
      <div className="bauhaus-accent-line" />

      <div className="quiz-progress">
        {QUIZ_DATA.map((_,i) => {
          let cls = 'quiz-pip';
          if (answers[i] !== null) {
            cls += answers[i] === QUIZ_DATA[i].correct ? ' correct' : ' wrong';
          } else if (i === current) {
            cls += ' done';
          }
          return <div key={i} className={cls} />;
        })}
        <span style={{fontSize:'0.8rem',color:'#6b7280',marginLeft:'0.5rem',fontFamily:"'Space Grotesk',sans-serif"}}>
          {c.question} {current + 1} {c.of} {QUIZ_DATA.length}
        </span>
      </div>

      {!showResult ? (
        <div className="bauhaus-card">
          <p style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:600,fontSize:'1.05rem',marginBottom:'1rem'}}>
            {lang === 'de' ? q.de : q.en}
          </p>
          {opts.map((opt, idx) => {
            let cls = 'quiz-option';
            if (answers[current] !== null) {
              if (idx === q.correct) cls += ' correct';
              else if (idx === answers[current]) cls += ' wrong';
            }
            return (
              <button
                key={idx}
                className={cls}
                onClick={() => handleAnswer(idx)}
                disabled={answers[current] !== null}
              >
                <span style={{fontWeight:700,marginRight:'0.5rem',color:'#9ca3af'}}>{String.fromCharCode(65+idx)})</span>
                {opt}
              </button>
            );
          })}
        </div>
      ) : (
        <div>
          <div className="quiz-score-banner">
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:800,fontSize:'2rem',color:'var(--primary)',marginBottom:'0.25rem'}}>
              {score} / {QUIZ_DATA.length}
            </div>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:600,marginBottom:'0.5rem'}}>
              {c.score}: {score} {c.correct}
            </div>
            <div style={{color:'#4b5563',marginBottom:'1rem'}}>{c.feedback[fbIdx]}</div>
            <button
              onClick={handleReset}
              style={{background:'var(--dark)',color:'white',border:'none',borderRadius:0,padding:'0.6rem 1.5rem',fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,cursor:'pointer',fontSize:'0.9rem'}}
            >
              {c.restart}
            </button>
          </div>

          <div style={{marginTop:'1rem',display:'flex',flexDirection:'column',gap:'0.4rem'}}>
            {QUIZ_DATA.map((qd, i) => (
              <div key={i} style={{display:'flex',alignItems:'flex-start',gap:'0.75rem',padding:'0.5rem',background: answers[i] === qd.correct ? '#f0fdf4':'#fef2f2', border: `1px solid ${answers[i] === qd.correct ? '#86efac':'#fca5a5'}`}}>
                <span style={{fontWeight:700,color: answers[i] === qd.correct ? '#16A34A':'#ef4444',minWidth:'20px'}}>{answers[i] === qd.correct ? '✓' : '✗'}</span>
                <span style={{fontSize:'0.88rem'}}>{lang === 'de' ? qd.de : qd.en}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </section>
  );
}
